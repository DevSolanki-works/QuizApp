<!--
  GAME SCREEN
  Shows: question progress bar · question text · 4 answer options
  · countdown timer ring · per-round leaderboard flash
-->
<style>
  .game-wrap {
    width: 100%; min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; padding: 0 20px 32px;
  }

  /* ── TOP STATUS BAR ─────────────────────────────────────── */
  .game-topbar {
    width: 100%; display: flex;
    align-items: center; justify-content: space-between;
    padding: 18px 0 12px;
  }
  .game-q-counter {
    font-family: var(--font-pixel); font-size: 8px;
    color: rgba(255,255,255,0.55); letter-spacing: 0.5px;
  }
  .game-score-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--radius-pill);
    background: rgba(255,217,61,0.15);
    border: 1px solid rgba(255,217,61,0.3);
    font-family: var(--font-pixel); font-size: 9px;
    color: var(--yellow);
  }
  .game-topic-chip {
    font-family: var(--font-pixel); font-size: 7px;
    color: rgba(255,255,255,0.45); letter-spacing: 0.3px;
    max-width: 100px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* ── PROGRESS STRIP ─────────────────────────────────────── */
  .game-progress-track {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  .game-progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--yellow), var(--green));
    transition: width 0.5s ease;
  }
  .game-phase-label {
    margin-top: 12px;
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--yellow); letter-spacing: 0.8px;
  }

  /* ── STREAK BAR ─────────────────────────────────────────── */
  /*
   * Sits between the progress strip and the timer ring.
   * Hidden (visibility:hidden) when streak = 0 so layout doesn't shift.
   * The multiplier badge pulses to draw the eye without being distracting.
   */
  .game-streak-bar {
    width: 100%; display: flex;
    align-items: center; justify-content: center;
    gap: 6px; min-height: 26px; margin-top: 6px;
  }
  .streak-fires {
    font-size: 14px; line-height: 1;
    /* pop-in each time streak tier increases */
    transition: opacity 0.2s;
  }
  .streak-label {
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--yellow); letter-spacing: 0.4px;
  }
  .streak-mult-badge {
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--green);
    padding: 2px 8px; border-radius: var(--radius-pill);
    background: rgba(6,214,160,0.15);
    border: 1px solid rgba(6,214,160,0.4);
    animation: mult-pulse 1.8s ease-in-out infinite;
  }
  @keyframes mult-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(6,214,160,0.45); }
    50%      { box-shadow: 0 0 0 5px rgba(6,214,160,0); }
  }

  /* ── COMBO FLASH OVERLAY ────────────────────────────────── */
  /*
   * Fixed-position overlay that pops up for ~1.5s when a combo milestone
   * is reached (streak 3, 6, 9 …). Lives outside .game-wrap so it can
   * escape any overflow:hidden clipping.
   */
  .combo-flash {
    position: fixed; top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 300; text-align: center;
    pointer-events: none; visibility: hidden;
  }
  .combo-flash.visible {
    visibility: visible;
    animation: combo-burst 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .combo-title {
    font-family: var(--font-pixel); font-size: 26px;
    color: var(--yellow); line-height: 1.3;
    text-shadow:
      0 0 30px rgba(255,217,61,0.9),
      0 4px 0 rgba(0,0,0,0.5);
  }
  .combo-sub {
    font-family: var(--font-pixel); font-size: 10px;
    color: var(--green); margin-top: 8px;
    text-shadow: 0 0 12px rgba(6,214,160,0.7);
  }
  @keyframes combo-burst {
    0%   { transform: translate(-50%,-50%) scale(0) rotate(-8deg); opacity: 0; }
    18%  { transform: translate(-50%,-50%) scale(1.25) rotate(2deg); opacity: 1; }
    32%  { transform: translate(-50%,-50%) scale(1) rotate(0deg);   opacity: 1; }
    72%  { transform: translate(-50%,-50%) scale(1) rotate(0deg);   opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.7) rotate(0deg); opacity: 0; }
  }

  /* ── TIMER RING ─────────────────────────────────────────── */
  .timer-wrap {
    margin: 16px 0 22px;
    position: relative; width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .timer-svg {
    position: absolute; top: 0; left: 0;
    width: 80px; height: 80px;
    transform: rotate(-90deg);
  }
  .timer-bg-circle {
    fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5;
  }
  .timer-fg-circle {
    fill: none; stroke: var(--yellow); stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 220;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .timer-fg-circle.urgent { stroke: var(--red); }
  .timer-number {
    font-family: var(--font-pixel); font-size: 20px;
    color: var(--white); z-index: 1;
    transition: color 0.3s;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
  }
  .timer-number.urgent { color: var(--red); }

  /* ── QUESTION CARD ──────────────────────────────────────── */
  .game-question-card {
    width: 100%; padding: 22px 20px;
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.15);
    text-align: center;
  }
  .game-question-number {
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--yellow); letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .game-question-text {
    font-family: var(--font-body); font-size: 18px;
    font-weight: 800; color: var(--white);
    line-height: 1.45;
  }
  @media (min-width: 1024px) {
    .game-question-text { font-size: 28px; }
    .game-options-grid  { gap: 20px; }
    .option-btn         { min-height: 84px; }
    .option-text        { font-size: 18px; }
  }

  /* ── ANSWER OPTIONS GRID ────────────────────────────────── */
  .game-options-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }
  @media (max-width: 300px) {
    .game-options-grid { grid-template-columns: 1fr; }
  }

  .option-btn {
    min-height: 72px; padding: 12px 14px;
    border-radius: var(--radius-md);
    border: none; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: transform 0.1s, filter 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none; text-align: left;
    position: relative; overflow: hidden;
  }
  .option-btn:active:not([disabled]) { transform: scale(0.97); }
  .option-btn[disabled] { cursor: default; }

  .option-btn[data-idx="0"] { background: var(--opt-a); box-shadow: 0 5px 0 #8b0011; }
  .option-btn[data-idx="1"] { background: var(--opt-b); box-shadow: 0 5px 0 #0d5fa3; }
  .option-btn[data-idx="2"] { background: var(--opt-c); box-shadow: 0 5px 0 #038a67; }
  .option-btn[data-idx="3"] { background: var(--opt-d); box-shadow: 0 5px 0 #5a2d8e; }

  .option-btn:active:not([disabled])[data-idx="0"] { box-shadow: 0 1px 0 #8b0011; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="1"] { box-shadow: 0 1px 0 #0d5fa3; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="2"] { box-shadow: 0 1px 0 #038a67; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="3"] { box-shadow: 0 1px 0 #5a2d8e; transform: translateY(4px); }

  .option-letter {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(0,0,0,0.22); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-pixel); font-size: 11px; color: #fff;
  }
  .option-text {
    flex: 1; font-family: var(--font-body);
    font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3;
  }

  /* ── ANSWER FEEDBACK ────────────────────────────────────── */
  .option-btn.correct {
    animation: correct-flash 0.4s ease;
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(6,214,160,0.7) !important;
    filter: brightness(1.15);
  }
  .option-btn.wrong {
    opacity: 0.4; filter: grayscale(60%);
    box-shadow: none !important; transform: scale(0.96);
  }
  .option-btn.dimmed {
    opacity: 0.4; filter: grayscale(60%);
    box-shadow: none !important; transform: scale(0.96);
  }
  .option-btn.chosen-wrong {
    background: var(--red) !important;
    opacity: 1; filter: none;
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(230,57,70,0.62) !important;
  }
  .option-btn.reveal-correct {
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(6,214,160,0.5) !important;
    filter: brightness(1.1);
  }
  @keyframes correct-flash {
    0%   { transform: scale(1);    }
    40%  { transform: scale(1.06); }
    100% { transform: scale(1);    }
  }

  .option-result-icon {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    animation: icon-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes icon-pop {
    from { transform: translateY(-50%) scale(0); }
    to   { transform: translateY(-50%) scale(1); }
  }

  /* ── MINI LEADERBOARD OVERLAY ───────────────────────────── */
  .leaderboard-overlay {
    position: fixed; inset: 0;
    background: rgba(13,27,142,0.96);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 32px 24px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    visibility: hidden; pointer-events: none; overflow-y: auto;
  }
  .leaderboard-overlay.visible {
    transform: translateY(0);
    visibility: visible; pointer-events: auto;
  }
  .lb-title {
    font-family: var(--font-pixel); font-size: 12px;
    color: var(--yellow); letter-spacing: 1px;
    margin-bottom: 24px; text-align: center;
  }
  .lb-list {
    width: 100%; max-width: var(--max-w);
    display: flex; flex-direction: column; gap: 10px;
  }
  .lb-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: var(--radius-md);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    animation: lb-slide 0.35s ease both;
  }
  .lb-row:nth-child(2) { animation-delay: 0.05s; }
  .lb-row:nth-child(3) { animation-delay: 0.10s; }
  .lb-row:nth-child(4) { animation-delay: 0.15s; }
  .lb-row:nth-child(5) { animation-delay: 0.20s; }
  @keyframes lb-slide {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0);    }
  }
  .lb-row.rank-1 { background: rgba(255,217,61,0.18); border-color: rgba(255,217,61,0.4); }
  .lb-row.rank-2 { background: rgba(192,192,192,0.12); border-color: rgba(192,192,192,0.3); }
  .lb-row.rank-3 { background: rgba(205,127,50,0.12); border-color: rgba(205,127,50,0.3); }

  .lb-rank {
    font-family: var(--font-pixel); font-size: 10px;
    color: rgba(255,255,255,0.5); width: 24px; text-align: center;
  }
  .lb-rank.rank-1 { color: var(--yellow); }
  .lb-rank.rank-2 { color: #C0C0C0; }
  .lb-rank.rank-3 { color: #CD7F32; }
  .lb-name {
    flex:1; font-family: var(--font-body);
    font-size: 16px; font-weight: 800; color: var(--white);
  }
  .lb-name.is-you { color: var(--yellow); }
  .lb-streak-badge {
    font-family: var(--font-pixel); font-size: 7px;
    color: var(--green); padding: 2px 6px;
    border-radius: var(--radius-pill);
    background: rgba(6,214,160,0.15);
    border: 1px solid rgba(6,214,160,0.3);
    margin-right: 4px;
  }
  .lb-score {
    font-family: var(--font-pixel); font-size: 10px;
    color: var(--white);
    display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
  }
  .lb-gain {
    font-family: var(--font-pixel); font-size: 7px;
    color: var(--green);
  }
  .lb-next-btn {
    margin-top: 28px; width: 100%; max-width: var(--max-w);
  }

  /* ── LOADING STATE ──────────────────────────────────────── */
  .game-loading {
    display: flex; flex-direction: column;
    align-items: center; gap: 18px;
    padding: 60px 0;
  }
  .game-loading-text {
    font-family: var(--font-pixel); font-size: 9px;
    color: rgba(255,255,255,0.6); text-align: center;
    letter-spacing: 0.5px; line-height: 2;
  }
  .big-emoji { font-size: 52px; animation: trophy-bounce 2s infinite ease-in-out; }
</style>

<div class="game-wrap" id="game-wrap">
  <div class="stars-bg" id="game-stars"></div>

  <!-- TOP STATUS BAR -->
  <div class="game-topbar z1">
    <span class="game-q-counter" id="game-q-counter">Q 1 / 10</span>
    <div class="game-score-chip">
      ⭐ <span id="game-my-score">0</span>
    </div>
    <span class="game-topic-chip" id="game-topic-label">—</span>
  </div>

  <!-- PROGRESS STRIP -->
  <div class="game-progress-track z1" style="width:100%">
    <div class="game-progress-fill" id="game-progress" style="width:0%"></div>
  </div>
  <p class="game-phase-label z1" id="game-phase-label">QUESTION LIVE</p>

  <!-- STREAK BAR (hidden until first correct answer) -->
  <!--
    visibility:hidden keeps the layout space so the timer ring doesn't jump.
    JS calls _updateStreakUI() on every ANSWER_REVEAL to update content and
    toggle visibility.
  -->
  <div class="game-streak-bar z1" id="game-streak-bar" style="visibility:hidden" aria-live="polite">
    <span class="streak-fires" id="streak-fires">🔥</span>
    <span class="streak-label" id="streak-label">1 STREAK</span>
    <span class="streak-mult-badge" id="streak-mult-badge" style="visibility:hidden">×1.5</span>
  </div>

  <!-- TIMER RING -->
  <div class="timer-wrap z1" id="timer-wrap" style="visibility:hidden">
    <svg class="timer-svg" viewBox="0 0 80 80">
      <circle class="timer-bg-circle" cx="40" cy="40" r="35"/>
      <circle class="timer-fg-circle" id="timer-circle" cx="40" cy="40" r="35"/>
    </svg>
    <span class="timer-number" id="timer-number">—</span>
  </div>

  <!-- QUESTION CARD -->
  <div class="game-question-card z1" id="game-question-card">
    <div class="game-loading">
      <div class="big-emoji">🤖</div>
      <div class="dot-loader" style="justify-content:center">
        <span></span><span></span><span></span>
      </div>
      <p class="game-loading-text">
        AI IS GENERATING<br>YOUR QUIZ...
      </p>
    </div>
  </div>

  <!-- ANSWER OPTIONS -->
  <div class="game-options-grid z1" id="game-options-grid" style="visibility:hidden">
    <!-- populated by JS -->
  </div>
</div>

<!-- LEADERBOARD OVERLAY (between rounds) -->
<div class="leaderboard-overlay" id="lb-overlay" aria-hidden="true">
  <p class="lb-title" id="lb-title">🏅 LEADERBOARD</p>
  <div class="lb-list" id="lb-list"></div>
  <div class="lb-next-btn">
    <div class="dot-loader" style="justify-content:center;margin-top:8px">
      <span></span><span></span><span></span>
    </div>
    <p id="lb-next-label" style="font-family:var(--font-pixel);font-size:8px;color:rgba(255,255,255,0.4);
              text-align:center;margin-top:10px;letter-spacing:0.5px;">
      NEXT QUESTION LOADING...
    </p>
  </div>
</div>

<!-- COMBO FLASH (fixed, outside game-wrap to escape overflow clipping) -->
<div class="combo-flash" id="combo-flash" aria-hidden="true" aria-live="assertive">
  <p class="combo-title" id="combo-title">🔥 COMBO!</p>
  <p class="combo-sub"   id="combo-sub">×1.5 MULTIPLIER</p>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   GAME SCREEN LOGIC
   ═══════════════════════════════════════════════════════════ */

const OPTION_LETTERS = ['A','B','C','D'];
const TIME_LIMIT_MS  = 20000;
const CIRCUMFERENCE  = 220;   /* 2π × 35 ≈ 220 */

let _timerInterval  = null;
let _timerStart     = null;
let _answered       = false;
let _chosenIndex    = null;
let _qIndex         = 0;
let _lbShowTimer    = null;
let _lbHideTimer    = null;
let _latestScores   = null;
let _lastTickSecond = -1;

// Streak state — kept locally so the bar doesn't flicker between questions.
let _currentStreak  = 0;

/** Called by router when screen becomes active */
function onGameShow() {
  Sound.stopBgMusic();
  const starsEl = document.getElementById('game-stars');
  if (starsEl) { starsEl.innerHTML = ''; spawnStars(starsEl); }

  const topicEl = document.getElementById('game-topic-label');
  if (topicEl) {
    const modeLabel = (State.mode || 'medium').toUpperCase();
    topicEl.textContent = State.topic ? `${State.topic} · ${modeLabel}` : modeLabel;
  }

  // Full reset for each new game session
  _answered = false;
  _qIndex   = 0;
  _clearLeaderboardTimers();
  _hideLB();
  _resetStreakUI();

  WS.on('QUESTION',    _onQuestion);
  WS.on('ANSWER_REVEAL', _onAnswerReveal);
  WS.on('INTERMISSION_LEADERBOARD', _onIntermissionLeaderboard);
  WS.on('GAME_OVER',   _onGameOver);
  WS.on('ERROR', (d)  => Toast.error(d.message || 'Error'));
}

/* ── QUESTION ────────────────────────────────────────────── */

function _onQuestion(data) {
  _answered    = false;
  _chosenIndex = null;
  _qIndex      = data.index;
  State.phase  = data.phase || 'question';
  State.currentQ = data;
  _setPhaseLabel('QUESTION LIVE');

  _clearLeaderboardTimers();
  _hideLB();
  const lbList = document.getElementById('lb-list');
  if (lbList) lbList.innerHTML = '';

  const timerWrap = document.getElementById('timer-wrap');
  if (timerWrap) timerWrap.style.visibility = 'visible';

  const total = State.totalQ;
  const pct   = (data.index / total) * 100;
  const progressEl = document.getElementById('game-progress');
  if (progressEl) progressEl.style.width = `${pct}%`;

  const counterEl = document.getElementById('game-q-counter');
  if (counterEl) counterEl.textContent = `Q ${data.index + 1} / ${total}`;

  const card = document.getElementById('game-question-card');
  if (card) {
    card.innerHTML = `
      <p class="game-question-number">QUESTION ${data.index + 1}</p>
      <p class="game-question-text">${_escHtml(data.text)}</p>
    `;
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'fade-up 0.3s ease';
  }

  const grid = document.getElementById('game-options-grid');
  if (grid) {
    grid.style.visibility = 'visible';
    grid.innerHTML = data.options.map((opt, i) => `
      <button class="option-btn" data-idx="${i}" onclick="gameAnswer(${i})">
        <span class="option-letter">${OPTION_LETTERS[i]}</span>
        <span class="option-text">${_escHtml(opt)}</span>
      </button>
    `).join('');
  }

  const roundLimitMs = data.time_limit_ms || State.timeLimitMs || TIME_LIMIT_MS;
  State.timeLimitMs  = roundLimitMs;
  _startTimer(roundLimitMs);
}

/* ── TIMER ───────────────────────────────────────────────── */

function _startTimer(limitMs) {
  _stopTimer();
  _lastTickSecond = -1;
  _timerStart = Date.now();
  const totalSecs = limitMs / 1000;

  const circleEl = document.getElementById('timer-circle');
  const numberEl = document.getElementById('timer-number');
  if (!circleEl || !numberEl) return;
  numberEl.textContent = Math.ceil(totalSecs);

  circleEl.style.strokeDashoffset = 0;
  circleEl.classList.remove('urgent');
  numberEl.classList.remove('urgent');

  _timerInterval = setInterval(() => {
    const elapsed   = Date.now() - _timerStart;
    const remaining = Math.max(0, limitMs - elapsed);
    const secsLeft  = Math.ceil(remaining / 1000);
    const progress  = elapsed / limitMs;

    numberEl.textContent = secsLeft;
    circleEl.style.strokeDashoffset = Math.min(1, progress) * CIRCUMFERENCE;

    if (remaining > 0 && remaining <= 5000 && secsLeft !== _lastTickSecond) {
      _lastTickSecond = secsLeft;
      Sound.tick();
    }

    if (remaining > 0 && remaining <= 5000) {
      circleEl.classList.add('urgent');
      numberEl.classList.add('urgent');
    }

    if (remaining <= 0) {
      _stopTimer();
      if (!_answered) {
        _answered = true;
        _disableOptions();
        // Timer expired without an answer → streak will be reset by server.
        // Optimistically reflect that on the local UI immediately.
        _resetStreakUI();
      }
    }
  }, 200);
}

function _stopTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

/* ── ANSWER ──────────────────────────────────────────────── */

function gameAnswer(choiceIndex) {
  if (_answered) return;
  Sound.click();
  _answered    = true;
  _chosenIndex = choiceIndex;
  _stopTimer();

  const timeMs = Date.now() - (_timerStart || Date.now());
  WS.send({ action: 'answer', choice: choiceIndex, time_ms: timeMs });
  _disableOptions(choiceIndex);
}

function _disableOptions(chosenIdx = null) {
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.setAttribute('disabled', 'true');
    if (chosenIdx !== null && i !== chosenIdx) {
      btn.style.opacity   = '0.45';
      btn.style.transform = 'scale(0.97)';
    }
  });
}

/* ── ANSWER REVEAL ──────────────────────────────────────── */

function _onAnswerReveal(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _hideLB();
  State.phase = data.phase || 'answer_reveal';
  _setPhaseLabel('ANSWER REVEAL');

  const correctIdx = data.correct_index;

  // ── Streak / combo logic ──────────────────────────────────
  // The server includes every player's post-answer streak in the broadcast.
  // We use our own entry to decide which sound to play and whether to fire
  // the combo overlay.
  const myStreak     = (data.streaks || {})[State.playerName] || 0;
  const myMultiplier = Math.min(1.0 + Math.floor(myStreak / 3) * 0.5, 3.0);
  // A milestone occurs at streaks 3, 6, 9 … — every multiple of 3.
  const hitMilestone = myStreak > 0 && myStreak % 3 === 0;

  // ── Sound selection ───────────────────────────────────────
  // Combo replaces the regular "correct" fanfare at milestone streaks.
  if (_chosenIndex !== null) {
    if (_chosenIndex === correctIdx) {
      if (hitMilestone) Sound.combo();
      else              Sound.correct();
    } else {
      Sound.wrong();
    }
  }
  // Timeout (no choice made) — streak already reset optimistically in timer
  // handler; server confirms via streaks:{name:0} in the payload.

  // ── Update streak bar & optionally flash combo overlay ────
  _updateStreakUI(myStreak, myMultiplier);
  if (hitMilestone && _chosenIndex === correctIdx) {
    _showComboFlash(myMultiplier);
  }
  // ─────────────────────────────────────────────────────────

  _latestScores = data.scores || _latestScores;
  State.scores  = _latestScores || State.scores;
  const myScore = (_latestScores && _latestScores[State.playerName]) || 0;
  const scoreEl = document.getElementById('game-my-score');
  if (scoreEl) scoreEl.textContent = myScore.toLocaleString();

  // Colour each option button based on correct / wrong / dimmed
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.setAttribute('disabled', 'true');
    btn.style.opacity  = '';
    btn.style.transform = '';
    btn.classList.remove('wrong','dimmed','chosen-wrong','reveal-correct','correct');

    if (i === correctIdx) {
      btn.classList.add('reveal-correct');
      const oldIcon = btn.querySelector('.option-result-icon');
      if (oldIcon) oldIcon.remove();
      const icon = document.createElement('span');
      icon.className   = 'option-result-icon';
      icon.textContent = '✓';
      btn.appendChild(icon);
    } else if (i === _chosenIndex) {
      btn.classList.add('chosen-wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });
}

/* ── STREAK UI HELPERS ───────────────────────────────────── */

/**
 * Update the streak bar to reflect the player's current consecutive correct
 * answers and the resulting multiplier.
 *
 * Tier mapping (mirrors server apply_streak_multiplier):
 *   streak 0   → hidden
 *   streak 1–2 → 🔥  "N STREAK"  (no multiplier badge yet)
 *   streak 3–5 → 🔥🔥 "N STREAK ×1.5"
 *   streak 6–8 → 🔥🔥🔥 "N STREAK ×2.0"
 *   streak 9+  → 🔥🔥🔥 "N STREAK ×2.5" … up to ×3.0 cap
 */
function _updateStreakUI(streak, multiplier) {
  _currentStreak = streak;
  const bar       = document.getElementById('game-streak-bar');
  const firesEl   = document.getElementById('streak-fires');
  const labelEl   = document.getElementById('streak-label');
  const multEl    = document.getElementById('streak-mult-badge');
  if (!bar) return;

  if (streak <= 0) {
    bar.style.visibility = 'hidden';
    return;
  }

  bar.style.visibility = 'visible';

  // Number of fire icons indicates which tier the player is in (max 3 shown)
  const tier      = Math.floor(streak / 3);  // 0 = building, 1 = ×1.5, 2 = ×2.0 …
  const fireCount = Math.min(tier + 1, 3);
  if (firesEl) firesEl.textContent = '🔥'.repeat(fireCount);
  if (labelEl) labelEl.textContent = `${streak} STREAK`;

  if (multEl) {
    if (multiplier > 1.0) {
      multEl.textContent        = `×${multiplier.toFixed(1)}`;
      multEl.style.visibility   = 'visible';
    } else {
      multEl.style.visibility   = 'hidden';
    }
  }
}

/**
 * Show the full-screen combo burst overlay for ~1.5 s.
 * Re-triggering before the previous animation ends resets it cleanly via
 * the offsetWidth reflow trick.
 */
function _showComboFlash(multiplier) {
  const el    = document.getElementById('combo-flash');
  const title = document.getElementById('combo-title');
  const sub   = document.getElementById('combo-sub');
  if (!el) return;

  if (title) title.textContent = '🔥 COMBO!';
  if (sub)   sub.textContent   = `×${multiplier.toFixed(1)} MULTIPLIER`;

  el.setAttribute('aria-hidden', 'false');
  el.classList.remove('visible');
  void el.offsetWidth;          // force reflow so animation restarts
  el.classList.add('visible');
  setTimeout(() => {
    el.classList.remove('visible');
    el.setAttribute('aria-hidden', 'true');
  }, 1500);
}

/** Hide streak bar and reset local counter. Called at game start. */
function _resetStreakUI() {
  _currentStreak = 0;
  const bar = document.getElementById('game-streak-bar');
  if (bar) bar.style.visibility = 'hidden';
  const multEl = document.getElementById('streak-mult-badge');
  if (multEl) multEl.style.visibility = 'hidden';
}

/* ── LEADERBOARD ─────────────────────────────────────────── */

function _onIntermissionLeaderboard(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _latestScores = data.scores || _latestScores;
  State.phase   = data.phase || 'intermission_leaderboard';
  _setPhaseLabel('ROUND STANDINGS');

  const myScore = (_latestScores && _latestScores[State.playerName]) || 0;
  State.scores  = _latestScores || State.scores;
  const scoreEl = document.getElementById('game-my-score');
  if (scoreEl) scoreEl.textContent = myScore.toLocaleString();

  const nextLabel = document.getElementById('lb-next-label');
  if (nextLabel) {
    nextLabel.textContent = data.is_final
      ? 'FINAL RESULTS LOADING...'
      : 'NEXT QUESTION LOADING...';
  }

  const sorted   = Object.entries(_latestScores || {}).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const streaks  = data.streaks || {};
  const lbList   = document.getElementById('lb-list');
  if (lbList) {
    const medals = ['🥇','🥈','🥉'];
    lbList.innerHTML = sorted.map(([name, score], i) => {
      const rank    = i + 1;
      const isYou   = name === State.playerName;
      const rankCls = rank <= 3 ? `rank-${rank}` : '';
      const medal   = rank <= 3 ? medals[i] : `${rank}`;
      const points  = (data.points_gained && data.points_gained[name]) || 0;
      const streak  = streaks[name] || 0;
      // Show a small streak badge in the leaderboard for players on a combo
      const streakHtml = streak >= 3
        ? `<span class="lb-streak-badge">🔥×${Math.min(1 + Math.floor(streak/3)*0.5, 3).toFixed(1)}</span>`
        : '';
      return `
        <div class="lb-row ${rankCls}">
          <span class="lb-rank ${rankCls}">${medal}</span>
          <span class="lb-name ${isYou ? 'is-you' : ''}">${_escHtml(name)}${isYou ? ' ★' : ''}</span>
          ${streakHtml}
          <span class="lb-score">${score.toLocaleString()}<small class="lb-gain">+${points}</small></span>
        </div>`;
    }).join('');
  }

  _showLB();
}

function _showLB() {
  const overlay = document.getElementById('lb-overlay');
  if (overlay) {
    overlay.classList.add('visible');
    overlay.setAttribute('aria-hidden', 'false');
  }
}
function _hideLB() {
  const overlay = document.getElementById('lb-overlay');
  if (overlay) {
    overlay.classList.remove('visible');
    overlay.setAttribute('aria-hidden', 'true');
  }
}

function _clearLeaderboardTimers() {
  if (_lbShowTimer) { clearTimeout(_lbShowTimer); _lbShowTimer = null; }
  if (_lbHideTimer) { clearTimeout(_lbHideTimer); _lbHideTimer = null; }
}

/* ── GAME OVER ───────────────────────────────────────────── */

function _onGameOver(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _hideLB();
  State.scores      = data.final_scores;
  State.playMode    = data.play_mode || State.playMode || 'classic';
  State.resultStats = data;
  State.phase       = 'complete';
  goTo('results');
}

/* ── UTILS ───────────────────────────────────────────────── */

function _setPhaseLabel(label) {
  const phaseEl = document.getElementById('game-phase-label');
  if (phaseEl) phaseEl.textContent = label;
}

function _escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
