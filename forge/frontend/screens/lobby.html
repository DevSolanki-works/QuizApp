<!--
  lobby.html — Forge: AI Trivia Showdown
  Screen shown after creating/joining a room.
  Host can set topic, difficulty, question count and start the game.
  All players see live player list via WebSocket.
-->
<div id="screen-lobby" class="screen">

  <!-- Room code display -->
  <div class="room-code-section">
    <p class="room-label">ROOM CODE</p>
    <div class="code-tiles-row" id="lobby-code-tiles"></div>
    <button class="copy-btn" id="lobby-copy-btn" onclick="copyRoomCode()">
      📋 COPY CODE
    </button>
  </div>

  <!-- Player list -->
  <div class="player-list-section">
    <p class="section-label">PLAYERS</p>
    <div id="lobby-player-list" class="player-list"></div>
  </div>

  <!-- Host controls (only visible to host) -->
  <div id="host-controls" style="display:none">

    <!-- Topic input -->
    <div class="topic-section">
      <p class="section-label">TOPIC</p>
      <input
        id="lobby-topic-input"
        class="topic-input"
        type="text"
        maxlength="60"
        placeholder="e.g. Marvel Movies"
        autocomplete="off"
      />
      <!-- Quick suggestion chips -->
      <div class="chip-row">
        <button class="chip" onclick="setTopic('Indian History')">🏛 Indian History</button>
        <button class="chip" onclick="setTopic('Cricket')">🏏 Cricket</button>
        <button class="chip" onclick="setTopic('Marvel Movies')">🦸 Marvel</button>
        <button class="chip" onclick="setTopic('Python Programming')">🐍 Python</button>
        <button class="chip" onclick="setTopic('Space & Astronomy')">🚀 Space</button>
        <button class="chip" onclick="setTopic('Bollywood')">🎬 Bollywood</button>
      </div>
    </div>

    <!-- Difficulty selector -->
    <div class="config-section">
      <p class="section-label">DIFFICULTY</p>
      <div class="difficulty-row">
        <button class="diff-btn active" data-diff="easy"   onclick="setDifficulty('easy')">😊 EASY</button>
        <button class="diff-btn"        data-diff="medium" onclick="setDifficulty('medium')">🔥 MEDIUM</button>
        <button class="diff-btn"        data-diff="hard"   onclick="setDifficulty('hard')">💀 HARD</button>
      </div>
    </div>

    <!-- Question count selector -->
    <div class="config-section">
      <p class="section-label">QUESTIONS</p>
      <div class="qcount-row">
        <button class="qcount-btn" data-count="5"  onclick="setQuestionCount(5)">5</button>
        <button class="qcount-btn active" data-count="10" onclick="setQuestionCount(10)">10</button>
        <button class="qcount-btn" data-count="15" onclick="setQuestionCount(15)">15</button>
        <button class="qcount-btn" data-count="20" onclick="setQuestionCount(20)">20</button>
      </div>
    </div>

    <!-- Start button -->
    <button class="start-btn chunky-btn" id="lobby-start-btn" onclick="startGame()">
      ▶ START GAME
    </button>
  </div>

  <!-- Non-host waiting message -->
  <div id="guest-waiting" style="display:none">
    <p class="waiting-text">⏳ Waiting for host to start the game...</p>
  </div>

</div>

<style>
/* ── Layout ───────────────────────────────────────────────────── */
#screen-lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 24px 16px 40px;
  max-width: 430px;
  margin: 0 auto;
}

/* ── Room code ────────────────────────────────────────────────── */
.room-code-section { text-align: center; width: 100%; }
.room-label, .section-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: #FFD93D;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.code-tiles-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
}
.code-tile {
  width: 56px; height: 64px;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,211,61,0.4);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Press Start 2P', monospace;
  font-size: 22px;
  color: #FFD93D;
}
.copy-btn {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px 18px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.copy-btn:hover { border-color: #FFD93D; color: #FFD93D; }

/* ── Player list ──────────────────────────────────────────────── */
.player-list-section { width: 100%; }
.player-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  min-height: 48px;
}
.player-chip {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 8px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: #fff;
}
.player-chip.host { border-color: #FFD93D; color: #FFD93D; }

/* ── Topic ────────────────────────────────────────────────────── */
.topic-section { width: 100%; }
.topic-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 800;
  padding: 16px 18px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.topic-input:focus { border-color: #FFD93D; }
.topic-input::placeholder { opacity: 0.4; }
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.chip {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.chip:hover { background: rgba(255,211,61,0.12); border-color: #FFD93D; }

/* ── Config sections (difficulty + question count) ────────────── */
.config-section { width: 100%; }

.difficulty-row, .qcount-row {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* Difficulty buttons */
.diff-btn {
  flex: 1;
  padding: 13px 8px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.6;
}
.diff-btn:hover { border-color: #FFD93D; }
.diff-btn.active {
  background: rgba(255,211,61,0.15);
  border-color: #FFD93D;
  color: #FFD93D;
}
/* Colour-coded active states per difficulty */
.diff-btn[data-diff="easy"].active   { border-color: #06D6A0; color: #06D6A0; background: rgba(6,214,160,0.12); }
.diff-btn[data-diff="medium"].active { border-color: #FFD93D; color: #FFD93D; background: rgba(255,211,61,0.12); }
.diff-btn[data-diff="hard"].active   { border-color: #E63946; color: #E63946; background: rgba(230,57,70,0.12); }

/* Question count buttons */
.qcount-btn {
  width: 64px; height: 56px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.qcount-btn:hover  { border-color: #FFD93D; }
.qcount-btn.active {
  background: rgba(255,211,61,0.15);
  border-color: #FFD93D;
  color: #FFD93D;
}

/* ── Start button ─────────────────────────────────────────────── */
.start-btn {
  width: 100%;
  padding: 20px;
  font-size: 14px;
  margin-top: 4px;
}

/* ── Waiting text ─────────────────────────────────────────────── */
.waiting-text {
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: rgba(255,255,255,0.6);
  text-align: center;
}
</style>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let selectedDifficulty  = 'easy';   // Default difficulty
let selectedQuestionCount = 10;     // Default question count

// ── Lifecycle hook called by router when lobby screen is shown ────────────────
function onLobbyShow() {
  renderCodeTiles();
  renderPlayers(State.players || []);

  if (State.isHost) {
    document.getElementById('host-controls').style.display = 'block';
    document.getElementById('guest-waiting').style.display  = 'none';
  } else {
    document.getElementById('host-controls').style.display = 'none';
    document.getElementById('guest-waiting').style.display  = 'block';
  }

  // Listen for WebSocket messages
  WS.on('PLAYER_JOINED', ({ players }) => {
    State.players = players;
    renderPlayers(players);
  });

  WS.on('GAME_STARTING', ({ topic, total_questions, difficulty, time_limit_ms }) => {
    State.topic   = topic;
    State.totalQ  = total_questions;
    State.timeLimitMs = time_limit_ms;
    goTo('game');
  });
}

// ── Render room code as individual tiles ──────────────────────────────────────
function renderCodeTiles() {
  const container = document.getElementById('lobby-code-tiles');
  container.innerHTML = '';
  (State.roomCode || '----').split('').forEach(ch => {
    const tile = document.createElement('div');
    tile.className   = 'code-tile';
    tile.textContent = ch;
    container.appendChild(tile);
  });
}

// ── Render player list ────────────────────────────────────────────────────────
function renderPlayers(players) {
  const list = document.getElementById('lobby-player-list');
  list.innerHTML = '';
  players.forEach(name => {
    const chip = document.createElement('div');
    chip.className   = 'player-chip' + (name === State.hostName ? ' host' : '');
    chip.textContent = name + (name === State.hostName ? ' 👑' : '');
    list.appendChild(chip);
  });
}

// ── Topic helpers ─────────────────────────────────────────────────────────────
function setTopic(topic) {
  document.getElementById('lobby-topic-input').value = topic;
}

// ── Difficulty selector ───────────────────────────────────────────────────────
function setDifficulty(diff) {
  selectedDifficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.diff === diff);
  });
}

// ── Question count selector ───────────────────────────────────────────────────
function setQuestionCount(count) {
  selectedQuestionCount = count;
  document.querySelectorAll('.qcount-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.count) === count);
  });
}

// ── Copy room code to clipboard ───────────────────────────────────────────────
function copyRoomCode() {
  navigator.clipboard.writeText(State.roomCode).then(() => {
    Toast.success('Room code copied!');
  });
}

// ── Start game (host only) ────────────────────────────────────────────────────
function startGame() {
  const topic = document.getElementById('lobby-topic-input').value.trim();
  if (!topic) {
    Toast.error('Please enter a topic first!');
    return;
  }
  WS.send({
    action:           'start_game',
    topic:            topic,
    difficulty:       selectedDifficulty,
    total_questions:  selectedQuestionCount,
  });
  document.getElementById('lobby-start-btn').disabled    = true;
  document.getElementById('lobby-start-btn').textContent = '⏳ GENERATING...';
}
</script>
