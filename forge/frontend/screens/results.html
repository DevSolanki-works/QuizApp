<!--
  RESULTS SCREEN
  Final podium with top 3, full leaderboard, play-again / home buttons
-->
<style>
  .results-wrap {
    width: 100%; min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; padding: 0 20px 60px;
    overflow-y: auto;
  }
  @media (max-width: 400px) {
    .results-wrap { padding: 0 12px 60px; }
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .results-header {
    width: 100%; text-align: center;
    padding: 30px 0 20px;
  }
  .results-trophy-anim {
    font-size: 56px;
    display: block; margin: 0 auto 8px;
    animation: winner-pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes winner-pop {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  .results-title {
    font-family: var(--font-pixel); font-size: 14px;
    color: var(--white); letter-spacing: 1px; line-height: 1.4;
    text-shadow: 0 2px 0 rgba(0,0,0,0.3);
  }
  .results-subtitle {
    font-family: var(--font-pixel); font-size: 8px;
    color: rgba(255,255,255,0.45); letter-spacing: 1px;
    margin-top: 6px;
  }
  .results-topic-badge {
    margin-top: 10px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: var(--radius-pill);
    background: rgba(255,217,61,0.12);
    border: 1px solid rgba(255,217,61,0.25);
    font-family: var(--font-pixel); font-size: 7px;
    color: var(--yellow); letter-spacing: 0.3px;
  }

  /* ── MAIN CONTENT (Single Column) ─────────────────────── */
  .results-main-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-top: 10px;
  }

  /* ── PODIUM ─────────────────────────────────────────────── */
  .podium-wrap {
    width: 100%; display: flex;
    align-items: flex-end; justify-content: center;
    gap: 8px; margin: 10px 0;
  }
  .podium-slot {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .podium-medal { font-size: 24px; line-height: 1; }
  .podium-name {
    font-family: var(--font-body); font-size: 12px;
    font-weight: 900; color: var(--white);
    text-align: center; max-width: 80px;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  .podium-name.is-you { color: var(--yellow); }
  .podium-pts {
    font-family: var(--font-pixel); font-size: 7px;
    color: rgba(255,255,255,0.6);
  }
  .podium-block {
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    width: 80px; display: flex; align-items: center;
    justify-content: center;
    font-family: var(--font-pixel); font-size: 14px;
    animation: block-grow 0.6s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: bottom;
  }
  .podium-block.p1 {
    height: 80px; background: linear-gradient(180deg, #FFD93D, #E6B800);
    box-shadow: 0 4px 15px rgba(255,217,61,0.3);
    animation-delay: 0.1s;
  }
  .podium-block.p2 {
    height: 60px; background: linear-gradient(180deg, #C0C0C0, #888);
    box-shadow: 0 4px 10px rgba(192,192,192,0.25);
    animation-delay: 0.2s;
  }
  .podium-block.p3 {
    height: 40px; background: linear-gradient(180deg, #CD9F60, #8B6914);
    box-shadow: 0 4px 8px rgba(205,127,50,0.25);
    animation-delay: 0.3s;
  }

  /* ── FULL LEADERBOARD ───────────────────────────────────── */
  .results-lb-card {
    width: 100%; padding: 20px;
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
  }
  @media (max-width: 400px) {
    .results-lb-card { padding: 16px 12px; }
  }
  .results-lb-title {
    font-family: var(--font-pixel); font-size: 9px;
    color: var(--yellow); letter-spacing: 0.5px;
    margin-bottom: 16px; text-align: center;
  }
  .results-lb-row {
    display: flex; flex-direction: column;
    padding: 10px 12px; border-radius: var(--radius-md);
    margin-bottom: 10px;
    animation: fade-up 0.3s ease both;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .results-lb-row.is-you {
    background: rgba(255,217,61,0.1);
    border: 1px solid rgba(255,217,61,0.25);
  }
  .rlb-main {
    display: flex; align-items: center; gap: 10px; width: 100%;
  }
  .rlb-rank {
    font-family: var(--font-pixel); font-size: 9px;
    color: rgba(255,255,255,0.4); width: 22px;
    text-align: center; flex-shrink: 0;
  }
  .rlb-name {
    flex: 1; font-family: var(--font-body);
    font-size: 14px; font-weight: 800; color: var(--white);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rlb-name.is-you { color: var(--yellow); }
  .rlb-score {
    font-family: var(--font-pixel); font-size: 9px;
    color: var(--white);
  }
  .rlb-bar-wrap {
    width: 100%; background: rgba(255,255,255,0.05);
    height: 3px; border-radius: 2px; margin-top: 8px;
    overflow: hidden;
  }
  .rlb-bar-fill {
    height: 100%; background: var(--yellow);
    transition: width 1s ease;
  }

  /* ── MY RESULT CALLOUT ──────────────────────────────────── */
  .my-result-card {
    width: 100%; padding: 24px 20px;
    border-radius: var(--radius-lg); text-align: center;
    background: rgba(255,217,61,0.08);
    border: 2px solid rgba(255,217,61,0.3);
    display: flex; flex-direction: column; gap: 8px;
  }
  .my-result-label {
    font-family: var(--font-pixel); font-size: 8px;
    color: rgba(255,255,255,0.5);
  }
  .my-result-score {
    font-family: var(--font-pixel); font-size: 32px;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(255,217,61,0.4);
  }
  .my-result-rank {
    font-family: var(--font-body); font-size: 16px;
    font-weight: 800; color: rgba(255,255,255,0.8);
  }

  /* ── SOLO RESULTS ───────────────────────────────────────── */
  .solo-results-card {
    width: 100%; padding: 28px 20px;
    border-radius: var(--radius-lg); text-align: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; gap: 24px;
  }
  .solo-score-value {
    font-family: var(--font-pixel); font-size: 36px;
    color: var(--yellow); margin-top: 8px;
  }
  .solo-stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .solo-stat {
    padding: 16px 8px; border-radius: var(--radius-md);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── ACTIONS ─────────────────────────────────────────────── */
  .results-actions {
    width: 100%; display: flex; flex-direction: column;
    gap: 14px; margin-top: 10px; padding-bottom: 20px;
  }
</style>

<div class="results-wrap" id="results-wrap">
  <div class="confetti-bg" id="results-confetti"></div>

  <!-- 1. HEADER -->
  <div class="results-header z1">
    <span class="results-trophy-anim" id="results-trophy">🏆</span>
    <h1 class="results-title">GAME OVER!</h1>
    <div class="results-topic-badge" id="results-topic">🎯 —</div>
  </div>

  <!-- 2. MAIN CONTENT (Vertical Flow) -->
  <div class="results-main-content z1">
    
    <!-- A. PODIUM (Visible in Classic mode) -->
    <div id="classic-podium-wrap" style="display:none;">
      <div class="podium-wrap" id="results-podium"></div>
    </div>

    <!-- B. LEADERBOARD / SOLO STATS (Prioritized at top) -->
    <div class="results-lb-card" id="leaderboard-card">
      <p class="results-lb-title" id="lb-card-title">📋 LEADERBOARD</p>
      <div id="results-lb-list"></div>
      
      <!-- Solo stats nested here if in solo mode -->
      <div id="solo-stats-nest" style="display:none;">
        <div class="solo-stat-grid">
          <div class="solo-stat">
            <span class="solo-stat-value" id="solo-accuracy" style="display:block; font-family:var(--font-pixel); font-size:12px; margin-bottom:6px;">0%</span>
            <span class="solo-stat-label" style="font-family:var(--font-pixel); font-size:7px; color:rgba(255,255,255,0.4);">ACCURACY</span>
          </div>
          <div class="solo-stat">
            <span class="solo-stat-value" id="solo-high-score" style="display:block; font-family:var(--font-pixel); font-size:12px; margin-bottom:6px;">0</span>
            <span class="solo-stat-label" style="font-family:var(--font-pixel); font-size:7px; color:rgba(255,255,255,0.4);">HIGH SCORE</span>
          </div>
        </div>
        <p id="solo-best-note" style="margin-top:16px; font-family:var(--font-body); font-size:13px; font-weight:800; color:var(--green); text-align:center;"></p>
      </div>
    </div>

    <!-- C. MY SPECIFIC RESULT -->
    <div class="my-result-card" id="my-result-card">
      <p class="my-result-label" id="my-result-label">YOUR FINAL SCORE</p>
      <p class="my-result-score" id="my-result-score">0</p>
      <p class="my-result-rank" id="my-result-rank">—</p>
    </div>

  </div>

  <!-- 3. ACTION BUTTONS -->
  <div class="results-actions z1">
    <button class="btn btn-primary" onclick="resultsPlayAgain()">
      🔄 &nbsp;PLAY AGAIN
    </button>
    <button class="btn btn-secondary" onclick="resultsGoHome()">
      🏠 &nbsp;BACK TO HOME
    </button>
  </div>
</div>

<script>
function onResultsShow() {
  const conf = document.getElementById('results-confetti');
  if (conf) { conf.innerHTML = ''; spawnConfetti(conf); }
  Sound.gameOver();
  _confettiBurst();

  const topicEl = document.getElementById('results-topic');
  if (topicEl) topicEl.textContent = `🎯 ${State.topic || 'Trivia'}`;

  const isSolo = State.playMode === 'solo';
  
  // Elements
  const podiumWrap = document.getElementById('classic-podium-wrap');
  const lbList = document.getElementById('results-lb-list');
  const soloNest = document.getElementById('solo-stats-nest');
  const lbTitle = document.getElementById('lb-card-title');
  const myResultLabel = document.getElementById('my-result-label');

  if (isSolo) {
    podiumWrap.style.display = 'none';
    lbList.style.display = 'none';
    soloNest.style.display = 'block';
    lbTitle.textContent = '📊 SOLO STATS';
    myResultLabel.textContent = 'FINAL SCORE';
    _renderSoloResult();
  } else {
    podiumWrap.style.display = 'block';
    lbList.style.display = 'block';
    soloNest.style.display = 'none';
    lbTitle.textContent = '📋 LEADERBOARD';
    myResultLabel.textContent = 'YOUR FINAL SCORE';

    const sorted = Object.entries(State.scores || {}).sort((a, b) => b[1] - a[1]);
    const maxScore = sorted[0]?.[1] || 1;
    _renderPodium(sorted);
    _renderFullLB(sorted, maxScore);
    _renderMyResult(sorted);
  }

  // Update Trophy based on rank
  const trophy = document.getElementById('results-trophy');
  if (!isSolo) {
    const sorted = Object.entries(State.scores || {}).sort((a, b) => b[1] - a[1]);
    const myRank = sorted.findIndex(([n]) => n === State.playerName) + 1;
    if (trophy) {
      trophy.textContent = myRank === 1 ? '🏆' : myRank === 2 ? '🥈' : myRank === 3 ? '🥉' : '🎮';
    }
  } else {
    if (trophy) trophy.textContent = '🎯';
  }

  if (State.ws) { State.ws.close(); State.ws = null; }
  setTimeout(() => Sound.startBgMusic(), 1200);
}

function _renderSoloResult() {
  const score = (State.scores && State.scores[State.playerName]) || 0;
  const stats = State.resultStats || {};
  const accuracy = (stats.accuracy_percentages && stats.accuracy_percentages[State.playerName]) || 0;
  const correct = (stats.correct_answers && stats.correct_answers[State.playerName]) || 0;
  const total = stats.total_questions || State.totalQ || 10;
  const storageKey = `forge.solo.highScore.${State.mode || 'medium'}`;
  
  let prev = 0;
  try { prev = Number(localStorage.getItem(storageKey)) || 0; } catch {}
  
  const highScore = Math.max(prev, score);
  if (highScore > prev) {
    try { localStorage.setItem(storageKey, String(highScore)); } catch {}
  }

  document.getElementById('my-result-score').textContent = score.toLocaleString();
  document.getElementById('solo-accuracy').textContent = `${accuracy}% (${correct}/${total})`;
  document.getElementById('solo-high-score').textContent = highScore.toLocaleString();
  
  const noteEl = document.getElementById('solo-best-note');
  noteEl.textContent = score > prev ? 'NEW PERSONAL BEST!' : 'KEEP IT UP!';
  document.getElementById('my-result-rank').textContent = 'SOLO MODE';
}

function _renderPodium(sorted) {
  const wrap = document.getElementById('results-podium');
  if (!wrap) return;
  const top3 = sorted.slice(0, 3);
  const medals = ['🥇','🥈','🥉'];
  const pClass = ['p1','p2','p3'];
  wrap.innerHTML = top3.map(([name, score], i) => {
    const isYou = name === State.playerName;
    return `
      <div class="podium-slot ${pClass[i]}">
        <span class="podium-medal">${medals[i]}</span>
        <p class="podium-name ${isYou ? 'is-you' : ''}">${_escHtml(name)}</p>
        <p class="podium-pts">${score.toLocaleString()}</p>
        <div class="podium-block ${pClass[i]}">${i + 1}</div>
      </div>`;
  }).join('');
}

function _renderFullLB(sorted, maxScore) {
  const list = document.getElementById('results-lb-list');
  if (!list) return;
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = sorted.map(([name, score], i) => {
    const rank = i + 1;
    const isYou = name === State.playerName;
    const rankStr = rank <= 3 ? medals[i] : `#${rank}`;
    const barPct = Math.round((score / maxScore) * 100);
    return `
      <div class="results-lb-row ${isYou ? 'is-you' : ''}" style="animation-delay:${i * 0.05}s;">
        <div class="rlb-main">
          <span class="rlb-rank">${rankStr}</span>
          <span class="rlb-name ${isYou ? 'is-you' : ''}">${_escHtml(name)}${isYou ? ' ✦' : ''}</span>
          <span class="rlb-score">${score.toLocaleString()}</span>
        </div>
        <div class="rlb-bar-wrap"><div class="rlb-bar-fill" style="width:${barPct}%"></div></div>
      </div>`;
  }).join('');
}

function _renderMyResult(sorted) {
  const myIdx = sorted.findIndex(([n]) => n === State.playerName);
  const myScore = myIdx >= 0 ? sorted[myIdx][1] : 0;
  const myRank = myIdx + 1;
  const total = sorted.length;
  document.getElementById('my-result-score').textContent = myScore.toLocaleString();
  const rankLabel = myRank === 1 ? '🏆 WINNER!' : myRank === 2 ? '🥈 2nd Place' : myRank === 3 ? '🥉 3rd Place' : `#${myRank} of ${total} players`;
  document.getElementById('my-result-rank').textContent = rankLabel;
}

function _confettiBurst() {
  const cols = ['#FFD93D','#06D6A0','#EF233C','#9B5DE5','#4FC3F7'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 3;
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'burst-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 180;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist + 80;
    el.style.cssText = `left:${cx}px; top:${cy}px; background:${cols[i % cols.length]}; --tx:${tx}px; --ty:${ty}px; --rot:${Math.random()*360}deg; --dur:${0.5+Math.random()}s; --delay:0s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

async function resultsPlayAgain() {
  if (State.isHost) {
    try {
      const data = await API.createRoom(State.playerName, State.playMode || 'classic');
      State.roomCode = data.room_code;
      State.players = [State.playerName]; State.scores = {};
      WS.connect(State.roomCode, State.playerName);
      await goTo('lobby');
    } catch(e) { Toast.error('Error creating room'); }
  } else { resultsGoHome(); }
}

function resultsGoHome() {
  State.roomCode = ''; State.players = []; State.scores = {};
  if (State.ws) { State.ws.close(); State.ws = null; }
  goTo('home');
}

function _escHtml(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
}
</script>
