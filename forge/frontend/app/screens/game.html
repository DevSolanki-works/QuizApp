<!--
  GAME SCREEN
  Shows: question progress bar · question text · 4 answer options
  · countdown timer ring · per-round leaderboard flash
  · streak/combo badge with fire particles
-->
<style>
  .game-wrap {
    width: 100%; min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; padding: 0 20px 32px;
  }

  /* ── TOP STATUS BAR ─────────────────────────────────────── */
  .game-topbar {
    width: 100%; display: flex;
    align-items: center; justify-content: space-between;
    padding: 18px 0 12px;
  }
  .game-q-counter {
    font-family: var(--font-pixel); font-size: 8px;
    color: rgba(255,255,255,0.55); letter-spacing: 0.5px;
  }
  .game-score-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: var(--radius-pill);
    background: rgba(255,217,61,0.15);
    border: 1px solid rgba(255,217,61,0.3);
    font-family: var(--font-pixel); font-size: 9px;
    color: var(--yellow);
  }
  .game-topic-chip {
    font-family: var(--font-pixel); font-size: 7px;
    color: rgba(255,255,255,0.45); letter-spacing: 0.3px;
    max-width: 100px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* ── TEAM SCORE BANNER (team mode only) ─────────────────── */
  .team-score-banner {
    width: 100%; display: flex; align-items: stretch;
    border-radius: var(--radius-md); overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    margin-bottom: 10px;
  }
  .team-score-side {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 8px 12px; gap: 2px;
  }
  .team-score-side.team-a { background: rgba(230,57,70,0.2); border-right: 1px solid rgba(255,255,255,0.1); }
  .team-score-side.team-b { background: rgba(33,150,243,0.2); }
  .team-score-side.my-team { box-shadow: inset 0 0 0 2px rgba(255,217,61,0.5); }
  .team-score-side.duel-answered { animation: duel-lock-flash 0.9s ease; }
  @keyframes duel-lock-flash {
    0%   { background: rgba(76,175,80,0.55); }
    100% { background: rgba(33,150,243,0.2); }
  }
  .team-score-name {
    font-family: var(--font-pixel); font-size: 7px;
    color: rgba(255,255,255,0.6); letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }
  .team-score-pts {
    font-family: var(--font-pixel); font-size: 11px;
    color: var(--white);
  }
  .team-score-divider {
    display: flex; align-items: center; padding: 0 10px;
    background: rgba(0,0,0,0.2);
    font-family: var(--font-pixel); font-size: 8px;
    color: rgba(255,255,255,0.4);
  }

  /* ── DUEL IN-GAME EMOJI BAR (duel mode only) ────────────── */
  .duel-emoji-bar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    display: none; gap: 10px; z-index: 400;
    background: rgba(9,15,80,0.85); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-pill); padding: 6px 10px;
  }
  .duel-emoji-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    font-size: 19px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, opacity 0.2s;
  }
  .duel-emoji-btn:active { transform: scale(0.85); }
  .duel-emoji-bar.cooling .duel-emoji-btn { opacity: 0.35; pointer-events: none; }
  /* Reactions float up from the sender's side of the VS banner */
  .duel-game-react {
    position: fixed; top: 18%; font-size: 38px;
    pointer-events: none; z-index: 9999;
    animation: duel-game-react-up 1.5s ease-out both;
  }
  .duel-game-react.mine   { left: 22%; }
  .duel-game-react.theirs { right: 22%; }
  @keyframes duel-game-react-up {
    0%   { transform: translateY(20px) scale(0.5); opacity: 0; }
    15%  { transform: translateY(0)    scale(1.15); opacity: 1; }
    100% { transform: translateY(-70px) scale(1); opacity: 0; }
  }

  /* ── POWER-UP BAR (signed-in players, all modes) ────────── */
  .powerup-bar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    display: none; gap: 10px; z-index: 401;
    background: rgba(9,15,80,0.85); backdrop-filter: blur(6px);
    border: 1px solid rgba(33,150,243,0.4);
    border-radius: var(--radius-pill); padding: 6px 10px;
  }
  /* In duels the emoji bar owns the bottom slot — power-ups sit above it */
  .powerup-bar.raised { bottom: 68px; }
  .powerup-btn {
    position: relative;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(33,150,243,0.15); border: 1px solid rgba(33,150,243,0.45);
    font-size: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, opacity 0.2s;
  }
  .powerup-btn:active { transform: scale(0.85); }
  .powerup-btn:disabled { opacity: 0.3; pointer-events: none; }
  .powerup-count {
    position: absolute; top: -4px; right: -4px;
    font-family: var(--font-pixel); font-size: 5px; color: var(--text-dark);
    background: var(--yellow); border-radius: var(--radius-pill);
    padding: 2px 5px; pointer-events: none;
  }
  /* 2X badge shown while DOUBLE_POINTS is armed for this question */
  #powerup-2x-badge {
    position: fixed; top: 20%; right: 12px; z-index: 402; display: none;
    font-family: var(--font-pixel); font-size: 9px; color: var(--yellow);
    background: rgba(255,217,61,0.14); border: 1.5px solid rgba(255,217,61,0.5);
    border-radius: var(--radius-pill); padding: 8px 12px;
    animation: pu-2x-pulse 1.2s ease infinite;
  }
  @keyframes pu-2x-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(255,217,61,0.25); }
    50%      { box-shadow: 0 0 18px rgba(255,217,61,0.55); }
  }
  /* Frozen / stolen timer flash cues */
  .timer-freeze-flash { animation: pu-freeze 0.9s ease; }
  @keyframes pu-freeze { 0% { filter: drop-shadow(0 0 18px #8fc7ff); } 100% { filter: none; } }
  .timer-steal-flash { animation: pu-steal 0.9s ease; }
  @keyframes pu-steal { 0% { filter: drop-shadow(0 0 18px #ef233c); } 100% { filter: none; } }

  /* ── DUEL SCORE GAP CHIP ───────────────────────────────── */
  .duel-gap-chip {
    display: none; margin: 4px auto 0; width: fit-content;
    font-family: var(--font-pixel); font-size: 7px; letter-spacing: 1px;
    padding: 4px 10px; border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6);
  }
  .duel-gap-chip.ahead  { color: var(--green, #2ecc71); border-color: rgba(46,204,113,0.4); }
  .duel-gap-chip.behind { color: var(--red, #ef233c);   border-color: rgba(239,35,60,0.4); }
  .duel-gap-chip.even   { color: var(--gold, #ffd166);  border-color: rgba(255,209,102,0.4); }

  /* ── SUDDEN DEATH DRAMA ────────────────────────────────── */
  .sd-flash {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    background: radial-gradient(circle, rgba(239,35,60,0.28), rgba(0,0,0,0.85));
    animation: sd-flash-in 2.4s ease both;
  }
  .sd-flash .sd-skull { font-size: 64px; animation: sd-shake 0.4s ease infinite; }
  .sd-flash .sd-title {
    font-family: var(--font-pixel); font-size: 18px; color: #ef233c;
    text-shadow: 0 0 18px rgba(239,35,60,0.8); margin-top: 12px; letter-spacing: 2px;
  }
  .sd-flash .sd-sub {
    font-family: var(--font-pixel); font-size: 8px; color: rgba(255,255,255,0.85);
    margin-top: 10px; letter-spacing: 1px;
  }
  @keyframes sd-flash-in { 0% { opacity: 0; } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes sd-shake { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
  .timer-wrap.sudden-death #timer-circle { stroke: #ef233c !important; }
  .timer-wrap.sudden-death .timer-number { color: #ef233c !important; animation: sd-pulse 0.8s ease infinite; }
  @keyframes sd-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* ── FINAL STRETCH 2X ──────────────────────────────────── */
  .final-stretch-banner {
    position: fixed; top: 24%; left: 50%; transform: translateX(-50%);
    z-index: 9997; pointer-events: none;
    font-family: var(--font-pixel); font-size: 13px; color: #ffd166;
    text-shadow: 0 0 16px rgba(255,209,102,0.9); letter-spacing: 2px;
    padding: 12px 18px; border-radius: 10px;
    background: rgba(0,0,0,0.75); border: 2px solid rgba(255,209,102,0.6);
    animation: fs-banner 2.2s ease both;
  }
  @keyframes fs-banner {
    0% { opacity: 0; transform: translateX(-50%) scale(0.6); }
    15% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    80% { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
  }
  .final-stretch-tag {
    display: none; margin: 4px auto 0; width: fit-content;
    font-family: var(--font-pixel); font-size: 6px; letter-spacing: 1px;
    padding: 3px 8px; border-radius: var(--radius-pill);
    color: #ffd166; background: rgba(255,209,102,0.12);
    border: 1px solid rgba(255,209,102,0.4);
    animation: fs-tag-pulse 1.4s ease infinite;
  }
  @keyframes fs-tag-pulse { 0%,100% { opacity: 0.75; } 50% { opacity: 1; } }

  /* ── SPEED TIER CHIP (duel reveal) ─────────────────────── */
  .speed-tier-chip {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    z-index: 9996; pointer-events: none;
    font-family: var(--font-pixel); font-size: 10px; letter-spacing: 1px;
    padding: 8px 14px; border-radius: var(--radius-pill);
    background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.25);
    animation: tier-pop 1.6s ease both;
  }
  .speed-tier-chip.fast { color: #ffd166; border-color: rgba(255,209,102,0.6); }
  .speed-tier-chip.mid  { color: #8fc7ff; border-color: rgba(143,199,255,0.6); }
  .speed-tier-chip.slow { color: rgba(255,255,255,0.6); }
  @keyframes tier-pop {
    0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.7); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.08); }
    75% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  }

  /* ── PROGRESS STRIP ─────────────────────────────────────── */
  .game-progress-track {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  .game-progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--yellow), var(--green));
    transition: width 0.5s ease;
  }
  .game-phase-label {
    margin-top: 12px;
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--yellow); letter-spacing: 0.8px;
  }

  /* ── TIMER RING ─────────────────────────────────────────── */
  .timer-wrap {
    margin: 20px 0 22px;
    position: relative; width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .timer-svg {
    position: absolute; top: 0; left: 0;
    width: 80px; height: 80px;
    transform: rotate(-90deg);
  }
  .timer-bg-circle {
    fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 5;
  }
  .timer-fg-circle {
    fill: none; stroke: var(--yellow); stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 220;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .timer-fg-circle.urgent { stroke: var(--red); }
  .timer-number {
    font-family: var(--font-pixel); font-size: 20px;
    color: var(--white); z-index: 1;
    transition: color 0.3s;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
  }
  .timer-number.urgent { color: var(--red); }

  /* ── STREAK BADGE ────────────────────────────────────────── */
  /*
   * Floats above the timer ring, anchored to the right of the game wrap.
   * State classes:
   *   .active   → visible, normal fire
   *   .mega     → 5+ streak, screen-edge glow
   *   .shatter  → wrong answer explosion, then removed
   */
  #streak-badge {
    position: fixed;
    top: 80px; right: 16px;
    z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    pointer-events: none;
    opacity: 0; transform: scale(0.5) translateY(10px);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  #streak-badge.active {
    opacity: 1; transform: scale(1) translateY(0);
  }
  #streak-badge.mega #streak-inner {
    background: linear-gradient(135deg, #FF6B00, #FFD93D);
    box-shadow: 0 0 0 3px rgba(255,107,0,0.4), 0 0 30px rgba(255,107,0,0.6);
    animation: mega-pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes mega-pulse {
    from { box-shadow: 0 0 0 3px rgba(255,107,0,0.4), 0 0 20px rgba(255,107,0,0.5); }
    to   { box-shadow: 0 0 0 5px rgba(255,107,0,0.6), 0 0 45px rgba(255,107,0,0.8); }
  }
  #streak-badge.shatter #streak-inner {
    animation: shatter-out 0.4s ease-out forwards;
  }
  @keyframes shatter-out {
    0%   { transform: scale(1); opacity: 1; }
    30%  { transform: scale(1.3) rotate(10deg); opacity: 0.8; }
    100% { transform: scale(0) rotate(-20deg); opacity: 0; }
  }

  #streak-inner {
    width: 54px; height: 54px; border-radius: 50%;
    background: linear-gradient(135deg, #FF4500, #FF8C00);
    box-shadow: 0 0 0 3px rgba(255,140,0,0.3), 0 0 20px rgba(255,69,0,0.5);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1px;
    animation: streak-float 2s ease-in-out infinite;
  }
  @keyframes streak-float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .streak-fire { font-size: 18px; line-height: 1; }
  .streak-count {
    font-family: var(--font-pixel); font-size: 9px;
    color: #fff; line-height: 1;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  #streak-label {
    font-family: var(--font-pixel); font-size: 6px;
    color: rgba(255,140,0,0.9); letter-spacing: 0.3px;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(255,140,0,0.8);
  }

  /* ── FIRE PARTICLES (streak 3+) ─────────────────────────── */
  .fire-particle {
    position: fixed; pointer-events: none; z-index: 199;
    width: 6px; height: 6px; border-radius: 50%;
    background: #FF6B00;
    animation: fire-rise var(--fdur, 0.8s) ease-out var(--fdelay, 0s) both;
  }
  @keyframes fire-rise {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--fx,0),var(--fy,-60px)) scale(0); opacity: 0; }
  }

  /* ── SCREEN-EDGE GLOW (streak 5+) ───────────────────────── */
  #streak-edge-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 195;
    opacity: 0; transition: opacity 0.4s ease;
    box-shadow: inset 0 0 60px 20px rgba(255,107,0,0.25);
    border-radius: inherit;
  }
  #streak-edge-glow.active { opacity: 1; }

  /* Streak level label inside badge */
  .streak-level-tag {
    font-family: var(--font-pixel); font-size: 6px;
    padding: 2px 6px; border-radius: 4px;
    background: rgba(0,0,0,0.3); color: #FFD93D;
    letter-spacing: 0.3px; white-space: nowrap;
  }

  /* ── QUESTION CARD ──────────────────────────────────────── */
  .game-question-card {
    width: 100%; padding: 22px 20px;
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.15);
    text-align: center;
  }
  .game-question-number {
    font-family: var(--font-pixel); font-size: 8px;
    color: var(--yellow); letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .game-question-text {
    font-family: var(--font-body); font-size: 18px;
    font-weight: 800; color: var(--white);
    line-height: 1.45;
  }
  @media (min-width: 1024px) {
    .game-question-text { font-size: 28px; }
    .game-options-grid  { gap: 20px; }
    .option-btn         { min-height: 84px; }
    .option-text        { font-size: 18px; }
  }

  /* ── ANSWER OPTIONS GRID ────────────────────────────────── */
  .game-options-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }
  @media (max-width: 300px) {
    .game-options-grid { grid-template-columns: 1fr; }
  }

  .option-btn {
    min-height: 72px; padding: 12px 14px;
    border-radius: var(--radius-md);
    border: none; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: transform 0.1s, filter 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none; text-align: left;
    position: relative; overflow: hidden;
  }
  .option-btn:active:not([disabled]) { transform: scale(0.97); }
  .option-btn[disabled] { cursor: default; }

  .option-btn[data-idx="0"] { background: var(--opt-a); box-shadow: 0 5px 0 #8b0011; }
  .option-btn[data-idx="1"] { background: var(--opt-b); box-shadow: 0 5px 0 #0d5fa3; }
  .option-btn[data-idx="2"] { background: var(--opt-c); box-shadow: 0 5px 0 #038a67; }
  .option-btn[data-idx="3"] { background: var(--opt-d); box-shadow: 0 5px 0 #5a2d8e; }

  .option-btn:active:not([disabled])[data-idx="0"] { box-shadow: 0 1px 0 #8b0011; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="1"] { box-shadow: 0 1px 0 #0d5fa3; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="2"] { box-shadow: 0 1px 0 #038a67; transform: translateY(4px); }
  .option-btn:active:not([disabled])[data-idx="3"] { box-shadow: 0 1px 0 #5a2d8e; transform: translateY(4px); }

  .option-letter {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(0,0,0,0.22); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-pixel); font-size: 11px; color: #fff;
  }
  .option-text {
    flex: 1; font-family: var(--font-body);
    font-size: 14px; font-weight: 800; color: #fff; line-height: 1.3;
  }

  /* ── ANSWER FEEDBACK states ─────────────────────────────── */
  .option-btn.correct {
    animation: correct-flash 0.4s ease;
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(6,214,160,0.7) !important;
    filter: brightness(1.15);
  }
  .option-btn.wrong {
    opacity: 0.4; filter: grayscale(60%);
    box-shadow: none !important; transform: scale(0.96);
  }
  .option-btn.dimmed {
    opacity: 0.4; filter: grayscale(60%);
    box-shadow: none !important; transform: scale(0.96);
  }
  .option-btn.chosen-wrong {
    background: var(--red) !important;
    opacity: 1; filter: none;
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(230,57,70,0.62) !important;
  }
  .option-btn.reveal-correct {
    box-shadow: 0 0 0 3px #fff, 0 0 20px rgba(6,214,160,0.5) !important;
    filter: brightness(1.1);
  }
  @keyframes correct-flash {
    0%   { transform: scale(1);    }
    40%  { transform: scale(1.06); }
    100% { transform: scale(1);    }
  }

  .option-result-icon {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    animation: icon-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes icon-pop {
    from { transform: translateY(-50%) scale(0); }
    to   { transform: translateY(-50%) scale(1); }
  }

  /* ── CORRECT BURST OVERLAY ───────────────────────────────── */
  .correct-burst {
    position: fixed; inset: 0; pointer-events: none;
    z-index: 150; border-radius: 12px;
    animation: correct-burst-anim 0.35s ease-out forwards;
  }
  @keyframes correct-burst-anim {
    0%   { box-shadow: inset 0 0 0px 0px rgba(6,214,160,0); }
    30%  { box-shadow: inset 0 0 40px 20px rgba(6,214,160,0.22); }
    100% { box-shadow: inset 0 0 0px 0px rgba(6,214,160,0); }
  }

  /* ── MINI LEADERBOARD OVERLAY ───────────────────────────── */
  .leaderboard-overlay {
    position: fixed; inset: 0;
    background: rgba(13,27,142,0.96);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; padding: 32px 24px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    visibility: hidden; pointer-events: none; overflow-y: auto;
  }
  .leaderboard-overlay.visible {
    transform: translateY(0); visibility: visible; pointer-events: auto;
  }
  .lb-title {

<script>
/* ═══════════════════════════════════════════════════════════
   GAME SCREEN LOGIC
   ═══════════════════════════════════════════════════════════ */

const OPTION_LETTERS = ['A','B','C','D'];
const TIME_LIMIT_MS  = 20000;
const CIRCUMFERENCE  = 220;

let _timerInterval  = null;
let _timerStart     = null;
let _answered       = false;
let _chosenIndex    = null;
let _qIndex         = 0;
let _lbShowTimer    = null;
let _lbHideTimer    = null;
let _latestScores   = null;
let _lastTickSecond = -1;
let _myStreak       = 0;       // local streak mirror (updated from server broadcasts)
let _streakTimeout  = null;    // used to time the shatter → hide transition
let _finalStretchAnnounced = false; // duel: 2X banner shown once per match

/** Called by router when screen becomes active */
function onGameShow() {
  // Stop any stale interval from a previous game session.
  // On Android/Capacitor, screen scripts persist in memory across games,
  // so _timerInterval from game 1 is still live when game 2 starts unless
  // we explicitly clear it here.
  _stopTimer();
  _clearLeaderboardTimers();
  Sound.stopBgMusic();
  const starsEl = document.getElementById('game-stars');
  if (starsEl) { starsEl.innerHTML = ''; spawnStars(starsEl); }

  const topicEl = document.getElementById('game-topic-label');
  if (topicEl) {
    const modeLabel = (State.mode || 'medium').toUpperCase();
    topicEl.textContent = State.topic ? `${State.topic} · ${modeLabel}` : modeLabel;
  }

  // Team banner setup — reused as a live YOU-vs-OPPONENT bar in duels
  const isTeam = State.playMode === 'team';
  const isDuel = State.playMode === 'duel';
  const teamBanner = document.getElementById('team-score-banner');
  if (teamBanner) teamBanner.style.display = (isTeam || isDuel) ? 'flex' : 'none';
  if (isTeam) _updateTeamBanner({});
  if (isDuel) _updateDuelBanner(State.scores || {});
  if (isDuel) State._duelRecordCounted = false; // new match → results may count W/L once
  _puUsedThisQuestion = {};
  _puUsedThisDuel     = [];
  _suddenDeath = false;
  _finalStretchAnnounced = false;
  document.getElementById('timer-wrap')?.classList.remove('sudden-death');
  const gapChip = document.getElementById('duel-gap-chip');
  if (gapChip) gapChip.style.display = 'none';
  const fsTag = document.getElementById('final-stretch-tag');
  if (fsTag) fsTag.style.display = 'none';
  const puBar = document.getElementById('powerup-bar');
  if (puBar) puBar.style.display = 'none'; // shown per-question by _puRenderBar
  const emojiBar = document.getElementById('duel-emoji-bar');
  if (emojiBar) {
    emojiBar.style.display = isDuel ? 'flex' : 'none';
    emojiBar.classList.remove('cooling');
  }

  // Reset local per-game state
  _answered = false;
  _qIndex   = 0;
  _myStreak = 0;
  _hideLB();
  _hideStreak(true);

  WS.on('QUESTION',                _onQuestion);
  WS.on('ANSWER_REVEAL',           _onAnswerReveal);
  WS.on('INTERMISSION_LEADERBOARD',_onIntermissionLeaderboard);
  WS.on('GAME_OVER',               _onGameOver);
  WS.on('SUDDEN_DEATH',            _onSuddenDeath);
  WS.on('DUEL_PLAYER_ANSWERED',    _onDuelPlayerAnswered);
  WS.on('DUEL_REACTION',           _onDuelGameReaction);
  WS.on('POWERUP_5050',            _onPowerup5050);
  WS.on('POWERUP_FREEZE',          _onPowerupFreeze);
  WS.on('POWERUP_DOUBLE',          _onPowerupDouble);
  WS.on('POWERUP_STEAL',           _onPowerupSteal);
  WS.on('POWERUP_USED',            _onPowerupUsed);
  WS.on('ERROR', (d)               => Toast.error(d.message || 'Error'));
}

/* ── DUEL SUDDEN DEATH ──────────────────────────────────── */
let _suddenDeath = false;

function _onSuddenDeath(d) {
  _suddenDeath = true;
  _setPhaseLabel('☠️ SUDDEN DEATH');
  Sound.gameStart();
  const flash = document.createElement('div');
  flash.className = 'sd-flash';
  flash.innerHTML = `
    <div class="sd-skull">☠️</div>
    <div class="sd-title">SUDDEN DEATH</div>
    <div class="sd-sub">ROUND ${d.round || 1} — NEXT QUESTION DECIDES IT</div>
  `;
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 2400);
  document.getElementById('timer-wrap')?.classList.add('sudden-death');
}

/* ── STREAK UI ──────────────────────────────────────────── */

/**
 * Show or update the streak badge.
 * @param {number} streak  — current consecutive correct count (≥1)
 */
function _showStreak(streak) {
  const badge    = document.getElementById('streak-badge');
  const countEl  = document.getElementById('streak-count');
  const labelEl  = document.getElementById('streak-label');
  const glow     = document.getElementById('streak-edge-glow');
  if (!badge) return;

  // Clear any pending shatter/hide timeout
  clearTimeout(_streakTimeout);
  badge.classList.remove('shatter');

  countEl.textContent = `×${streak}`;

  // Label text by milestone
  if (streak >= 12) {
    labelEl.textContent = 'GODLIKE!';
  } else if (streak >= 9) {
    labelEl.textContent = 'UNSTOPPABLE!';
  } else if (streak >= 6) {
    labelEl.textContent = 'ON FIRE!';
  } else if (streak >= 3) {
    labelEl.textContent = 'COMBO!';
  } else {
    labelEl.textContent = `${streak} IN A ROW`;
  }

  badge.classList.toggle('mega', streak >= 5);
  badge.classList.add('active');

  // Edge glow at 5+
  if (glow) glow.classList.toggle('active', streak >= 5);

  // Spawn fire particles at 3+
  if (streak >= 3) _spawnFireParticles(streak);
}

/**
 * Hide the streak badge.
 * @param {boolean} instant — skip animation (used on screen reset)
 */
function _hideStreak(instant) {
  const badge = document.getElementById('streak-badge');
  const glow  = document.getElementById('streak-edge-glow');
  clearTimeout(_streakTimeout);
  if (!badge) return;
  if (instant) {
    badge.classList.remove('active', 'mega', 'shatter');
    if (glow) glow.classList.remove('active');
    return;
  }
  // Shatter animation, then fully hide after it completes
  badge.classList.add('shatter');
  if (glow) glow.classList.remove('active');
  _streakTimeout = setTimeout(() => {
    badge.classList.remove('active', 'mega', 'shatter');
  }, 450);
}

/** Spawn floating fire particles around the badge position */
function _spawnFireParticles(streak) {
  const badge = document.getElementById('streak-badge');
  if (!badge) return;
  const rect = badge.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const count = Math.min(streak, 8);

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'fire-particle';
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist  = 30 + Math.random() * 30;
    const fx    = Math.cos(angle) * dist;
    const fy    = -40 - Math.random() * 40;
    const colors = ['#FF6B00','#FF8C00','#FFD93D','#FF4500'];
    el.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${colors[i % colors.length]};
      --fx:${fx}px; --fy:${fy}px;
      --fdur:${0.6 + Math.random() * 0.5}s;
      --fdelay:${Math.random() * 0.2}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

/* ── QUESTION ────────────────────────────────────────────── */

function _onQuestion(data) {
  _answered    = false;
  _chosenIndex = null;
  _qIndex      = data.index;
  State.phase  = data.phase || 'question';
  State.currentQ = data;
  _setPhaseLabel('QUESTION LIVE');

  // Fresh question → per-question power-up state resets
  _puUsedThisQuestion = {};
  const twoXBadge = document.getElementById('powerup-2x-badge');
  if (twoXBadge) twoXBadge.style.display = 'none';
  _puRenderBar();

  // Duel FINAL STRETCH (last 3 main questions = 2x points)
  const fsTag = document.getElementById('final-stretch-tag');
  if (fsTag) fsTag.style.display = data.final_stretch ? 'block' : 'none';
  if (data.final_stretch && !_finalStretchAnnounced) {
    _finalStretchAnnounced = true;
    const banner = document.createElement('div');
    banner.className = 'final-stretch-banner';
    banner.textContent = '🔥 FINAL STRETCH — 2X POINTS!';
    document.body.appendChild(banner);
    setTimeout(() => banner.remove(), 2200);
    Sound.gameStart?.();
  }

  _clearLeaderboardTimers();
  _hideLB();
  const lbList = document.getElementById('lb-list');
  if (lbList) lbList.innerHTML = '';

  // Update team banner if in team mode
  if (data.team_scores) _updateTeamBanner(data);

  const timerWrap = document.getElementById('timer-wrap');
  if (timerWrap) timerWrap.style.visibility = 'visible';

  const total = State.totalQ;
  const pct   = (data.index / total) * 100;
  const progressEl = document.getElementById('game-progress');
  if (progressEl) progressEl.style.width = `${pct}%`;
  const counterEl = document.getElementById('game-q-counter');
  if (counterEl) counterEl.textContent = `Q ${data.index + 1} / ${total}`;

  const card = document.getElementById('game-question-card');
  if (card) {
    card.innerHTML = `
      <p class="game-question-number">QUESTION ${data.index + 1}</p>
      <p class="game-question-text">${_escHtml(data.text)}</p>
    `;
    card.style.animation = 'none';
    void card.offsetWidth;
    card.style.animation = 'fade-up 0.3s ease';
  }

  const grid = document.getElementById('game-options-grid');
  if (grid) {
    grid.style.visibility = 'visible';
    grid.innerHTML = data.options.map((opt, i) => `
      <button class="option-btn" data-idx="${i}" onclick="gameAnswer(${i})">
        <span class="option-letter">${OPTION_LETTERS[i]}</span>
        <span class="option-text">${_escHtml(opt)}</span>
      </button>
    `).join('');
  }

  const roundLimitMs = data.time_limit_ms || State.timeLimitMs || TIME_LIMIT_MS;
  State.timeLimitMs = roundLimitMs;
  _startTimer(roundLimitMs, data._receivedAt);
}

/* ── TIMER ───────────────────────────────────────────────── */

function _startTimer(limitMs, receivedAt = null) {
  _stopTimer();
  _lastTickSecond = -1;
  
  // Use receivedAt to sync with server time if the message was queued during animations
  const now = Date.now();
  const queueDelay = receivedAt ? (now - receivedAt) : 0;
  _timerStart = now - queueDelay;

  const totalSecs = limitMs / 1000;

  const circleEl = document.getElementById('timer-circle');
  const numberEl = document.getElementById('timer-number');
  if (!circleEl || !numberEl) return;
  numberEl.textContent = Math.ceil(totalSecs);
  circleEl.style.strokeDashoffset = 0;
  circleEl.classList.remove('urgent');
  numberEl.classList.remove('urgent');

  _timerInterval = setInterval(() => {
    const elapsed   = Date.now() - _timerStart;
    const remaining = Math.max(0, limitMs - elapsed);
    const secsLeft  = Math.ceil(remaining / 1000);
    const progress  = elapsed / limitMs;

    numberEl.textContent = secsLeft;
    circleEl.style.strokeDashoffset = Math.min(1, progress) * CIRCUMFERENCE;

    if (remaining > 0 && remaining <= 5000 && secsLeft !== _lastTickSecond) {
      _lastTickSecond = secsLeft;
      Sound.tick();
    }
    if (remaining > 0 && remaining <= 5000) {
      circleEl.classList.add('urgent');
      numberEl.classList.add('urgent');
    }
    if (remaining <= 0) {
      _stopTimer();
      // Added 500ms client-side "soft" buffer to avoid racing the server's grace period.
      // If we haven't answered, we wait for the server to force the reveal.
      if (!_answered) {
        // We don't force _answered = true here immediately to allow a late-arrival
        // ANSWER_REVEAL message to take precedence, but we disable interaction.
        _disableOptions();
      }
    }
  }, 200);
}

function _stopTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

/* ── ANSWER ──────────────────────────────────────────────── */

function gameAnswer(choiceIndex) {
  if (_answered) return;
  Sound.click();
  _answered    = true;
  _chosenIndex = choiceIndex;
  _stopTimer();

  const timeMs = Date.now() - (_timerStart || Date.now());
  WS.send({ action: 'answer', choice: choiceIndex, time_ms: timeMs });
  _disableOptions(choiceIndex);
  _puRenderBar(); // answered → all power-up buttons disable
}

function _disableOptions(chosenIdx = null) {
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.setAttribute('disabled', 'true');
    if (chosenIdx !== null && i !== chosenIdx) {
      btn.style.opacity   = '0.45';
      btn.style.transform = 'scale(0.97)';
    }
  });
}

/* ── ANSWER REVEAL ──────────────────────────────────────── */

function _onAnswerReveal(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _hideLB();
  State.phase = data.phase || 'answer_reveal';
  _setPhaseLabel('ANSWER REVEAL');

  const correctIdx = data.correct_index;
  const isCorrect  = _chosenIndex === correctIdx;
  const didAnswer  = _chosenIndex !== null;

  // Update local streak from server source-of-truth
  const serverStreak = (data.streaks && data.streaks[State.playerName]) ?? _myStreak;
  _myStreak = serverStreak;

  // Sound
  if (didAnswer) {
    if (isCorrect) Sound.correct();
    else           Sound.wrong();
  }

  // Streak badge update
  if (isCorrect && _myStreak >= 1) {
    _showStreak(_myStreak);
  } else if (!isCorrect || !didAnswer) {
    // Wrong answer or timeout → shatter badge if it was showing
    if (document.getElementById('streak-badge')?.classList.contains('active')) {
      _hideStreak(false);   // ← FIX: shatter animation, then disappear
    }
  }

  // Green screen burst on correct answer
  if (isCorrect) {
    const burst = document.createElement('div');
    burst.className = 'correct-burst';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 400);
  }

  _latestScores = data.scores || _latestScores;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.setAttribute('disabled', 'true');
    btn.style.opacity   = '';
    btn.style.transform = '';
    btn.classList.remove('wrong','dimmed','chosen-wrong','reveal-correct','correct');

    if (i === correctIdx) {
      btn.classList.add('reveal-correct');
      const oldIcon = btn.querySelector('.option-result-icon');
      if (oldIcon) oldIcon.remove();
      const icon = document.createElement('span');
      icon.className   = 'option-result-icon';
      icon.textContent = '✓';
      btn.appendChild(icon);
    } else if (i === _chosenIndex) {
      btn.classList.add('chosen-wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });

  const myScore = (_latestScores && _latestScores[State.playerName]) || 0;
  State.scores  = _latestScores || State.scores;
  const scoreEl = document.getElementById('game-my-score');
  if (scoreEl) scoreEl.textContent = myScore.toLocaleString();

  // Update team banner
  if (data.team_scores) _updateTeamBanner(data);
  if (State.playMode === 'duel') {
    _updateDuelBanner(_latestScores || {});
    // Speed-tier feedback: show which speed bracket your correct answer hit.
    if (isCorrect && data.speed_tiers) {
      const tier = data.speed_tiers[State.playerName];
      const gained = (data.points_gained && data.points_gained[State.playerName]) || 0;
      const label = tier === 'fast' ? `⚡ FAST +${gained}`
                  : tier === 'mid'  ? `🕐 QUICK +${gained}`
                  : tier === 'slow' ? `🐢 +${gained}` : '';
      if (label) {
        const chip = document.createElement('div');
        chip.className = `speed-tier-chip ${tier}`;
        chip.textContent = label;
        document.body.appendChild(chip);
        setTimeout(() => chip.remove(), 1600);
      }
    }
  }
}

/* ── LEADERBOARD ─────────────────────────────────────────── */

function _onIntermissionLeaderboard(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _latestScores = data.scores || _latestScores;
  State.phase   = data.phase || 'intermission_leaderboard';
  _setPhaseLabel('ROUND STANDINGS');

  const myScore = (_latestScores && _latestScores[State.playerName]) || 0;
  State.scores  = _latestScores || State.scores;
  const scoreEl = document.getElementById('game-my-score');
  if (scoreEl) scoreEl.textContent = myScore.toLocaleString();

  const nextLabel = document.getElementById('lb-next-label');
  if (nextLabel) {
    nextLabel.textContent = data.is_final ? 'FINAL RESULTS LOADING...' : 'NEXT QUESTION LOADING...';
  }

  // ── Team score cards ──
  const teamSection = document.getElementById('lb-team-section');
  if (data.team_scores && data.team_names) {
    teamSection.style.display = 'block';
    const scores    = data.team_scores;
    const names     = data.team_names;
    const scoreA    = scores['A'] || 0;
    const scoreB    = scores['B'] || 0;
    const leadingA  = scoreA >= scoreB;
    document.getElementById('lb-team-cards').innerHTML = `
      <div class="team-lb-card team-a ${leadingA ? 'leading' : ''}">
        <p class="team-lb-card-name">${_escHtml(names['A'] || 'Team A')}</p>
        <p class="team-lb-card-score">${scoreA.toLocaleString()}</p>
        ${leadingA ? '<p class="team-lb-card-label">LEADING</p>' : ''}
      </div>
      <div class="team-lb-card team-b ${!leadingA ? 'leading' : ''}">
        <p class="team-lb-card-name">${_escHtml(names['B'] || 'Team B')}</p>
        <p class="team-lb-card-score">${scoreB.toLocaleString()}</p>
        ${!leadingA ? '<p class="team-lb-card-label">LEADING</p>' : ''}
      </div>
    `;
    // Update banner
    if (data.team_scores) _updateTeamBanner(data);
  } else {
    teamSection.style.display = 'none';
  }

  // ── Player leaderboard rows ──
  const sorted = Object.entries(_latestScores || {}).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const lbList = document.getElementById('lb-list');
  if (lbList) {
    const medals   = ['🥇','🥈','🥉'];
    const streaks  = data.streaks || {};
    const teams    = data.teams || {};
    const teamNames= data.team_names || {};
    lbList.innerHTML = sorted.map(([name, score], i) => {
      const rank    = i + 1;
      const isYou   = name === State.playerName;
      const rankCls = rank <= 3 ? `rank-${rank}` : '';
      const medal   = rank <= 3 ? medals[i] : `${rank}`;
      const points  = (data.points_gained && data.points_gained[name]) || 0;
      const streak  = streaks[name] || 0;
      const streakHtml = streak >= 2
        ? `<span class="lb-streak visible">🔥</span>`
        : '';
      // Small team tag
      const teamId  = teams[name];
      const teamTag = teamId ? `<small style="font-family:var(--font-pixel);font-size:6px;color:rgba(255,255,255,0.45);margin-left:4px;">[${teamNames[teamId] || teamId}]</small>` : '';
      return `
        <div class="lb-row ${rankCls}">
          <span class="lb-rank ${rankCls}">${medal}</span>
          <span class="lb-name ${isYou ? 'is-you' : ''}">${streakHtml}${_escHtml(name)}${teamTag}${isYou ? ' ★' : ''}</span>
          <span class="lb-score">${score.toLocaleString()}<small class="lb-gain">+${points}</small></span>
        </div>`;
    }).join('');
  }

  _showLB();
}

/* ── TEAM BANNER ─────────────────────────────────────────── */

function _updateTeamBanner(data) {
  const nameA  = document.getElementById('tsb-a-name');
  const ptsA   = document.getElementById('tsb-a-pts');
  const nameB  = document.getElementById('tsb-b-name');
  const ptsB   = document.getElementById('tsb-b-pts');
  const sideA  = document.getElementById('tsb-a');
  const sideB  = document.getElementById('tsb-b');

  const names  = data.team_names || State.teamNames || {};
  const scores = data.team_scores || {};
  const myTeam = (data.teams || State.teams || {})[State.playerName];

  if (nameA) nameA.textContent = names['A'] || 'Team A';
  if (nameB) nameB.textContent = names['B'] || 'Team B';
  if (ptsA)  ptsA.textContent  = (scores['A'] || 0).toLocaleString();
  if (ptsB)  ptsB.textContent  = (scores['B'] || 0).toLocaleString();

  if (sideA) sideA.classList.toggle('my-team', myTeam === 'A');
  if (sideB) sideB.classList.toggle('my-team', myTeam === 'B');

  // Cache in State for next render
  if (names['A']) { State.teamNames = names; }
  if (data.teams) { State.teams = data.teams; }
}

/* ── DUEL BANNER (reuses team banner slots: A = you, B = opponent) ── */

function _onDuelPlayerAnswered(d) {
  if (!d || d.name === State.playerName) return;
  // Opponent locked in — flash a "LOCKED IN" cue on their HUD side.
  const nameB = document.getElementById('tsb-b-name');
  const sideB = document.getElementById('tsb-b');
  if (nameB) nameB.textContent = '✓ LOCKED IN';
  if (sideB) {
    sideB.classList.add('duel-answered');
    setTimeout(() => sideB.classList.remove('duel-answered'), 900);
  }
}

/* ── DUEL IN-GAME EMOJI REACTIONS ────────────────────────── */

const DUEL_REACT_COOLDOWN_MS = 2500; // spam guard — one reaction per 2.5s

function duelGameReact(emoji) {
  const bar = document.getElementById('duel-emoji-bar');
  if (!bar || bar.classList.contains('cooling')) return;
  Sound.click();
  _floatDuelGameReaction(emoji, true);
  if (State.ws?.readyState === WebSocket.OPEN) {
    WS.send({ action: 'duel_reaction', emoji });
  }
  bar.classList.add('cooling');
  setTimeout(() => bar.classList.remove('cooling'), DUEL_REACT_COOLDOWN_MS);
}

/* ── POWER-UPS ───────────────────────────────────────────── */

// Ordered ids + icons mirror the server catalog in powerups.py.
const PU_CATALOG = [
  { id: 'fifty_fifty',   icon: '➗' },
  { id: 'time_freeze',   icon: '❄️' },
  { id: 'double_points', icon: '✨' },
  { id: 'time_steal',    icon: '⏳', duelOnly: true },
];
let _puUsedThisQuestion = {};   // id → true (client-side echo of server rule)
let _puUsedThisDuel     = [];   // ids used across the whole duel (max 2, distinct)

function _puRenderBar() {
  const bar = document.getElementById('powerup-bar');
  if (!bar) return;
  const inv = State.user?.powerups || {};
  const isDuel = State.playMode === 'duel';
  const usable = PU_CATALOG.filter(p =>
    (isDuel || !p.duelOnly) && Number(inv[p.id] || 0) > 0
  );
  if (!State.user || !usable.length) { bar.style.display = 'none'; return; }

  bar.classList.toggle('raised', isDuel); // emoji bar owns the bottom slot in duels
  bar.innerHTML = usable.map(p => {
    const disabled = _answered
      || _puUsedThisQuestion[p.id]
      || (isDuel && (_puUsedThisDuel.length >= 2 || _puUsedThisDuel.includes(p.id)));
    return `<button class="powerup-btn" ${disabled ? 'disabled' : ''} onclick="puUse('${p.id}')">
      ${p.icon}<span class="powerup-count">×${inv[p.id]}</span>
    </button>`;
  }).join('');
  bar.style.display = 'flex';
}

function puUse(id) {
  if (_answered || _puUsedThisQuestion[id]) return;
  Sound.click();
  _puUsedThisQuestion[id] = true;
  if (State.playMode === 'duel') _puUsedThisDuel.push(id);
  // Optimistic decrement — server is authoritative; an ERROR reply just
  // means the effect never arrives and the shop resyncs the real count.
  if (State.user?.powerups) {
    State.user.powerups[id] = Math.max(0, Number(State.user.powerups[id] || 0) - 1);
    Session.save();
  }
  WS.send({ action: 'use_powerup', powerup_id: id, user_id: State.user?.id });
  if (typeof Analytics !== 'undefined') {
    Analytics.logEvent('powerup_used', { powerup_id: id, play_mode: State.playMode }).catch?.(() => {});
  }
  _puRenderBar();
}

function _onPowerup5050(d) {
  // Hide the two server-chosen wrong options.
  (d.remove || []).forEach(i => {
    const btn = document.querySelector(`#game-options-grid .option-btn[data-idx="${i}"]`);
    if (btn) { btn.style.opacity = '0.15'; btn.style.pointerEvents = 'none'; }
  });
  Toast.success('50/50 — two wrong answers removed!');
}

function _puShiftTimer(deltaMs) {
  // Restart the local countdown with adjusted remaining time; the server
  // deadline was already adjusted (freeze) or unchanged-for-me (steal is
  // cosmetic pressure on the victim's local clock only if server said so).
  if (_answered || _timerStart == null) return;
  const elapsed   = Date.now() - _timerStart;
  const remaining = Math.max(600, (State.timeLimitMs || TIME_LIMIT_MS) - elapsed + deltaMs);
  State.timeLimitMs = remaining;
  _startTimer(remaining);
}

function _onPowerupFreeze(d) {
  _puShiftTimer((d.seconds || 5) * 1000);
  const wrap = document.getElementById('timer-wrap');
  if (wrap) { wrap.classList.add('timer-freeze-flash'); setTimeout(() => wrap.classList.remove('timer-freeze-flash'), 950); }
  Toast.success(`❄️ +${d.seconds || 5} SECONDS!`);
}

function _onPowerupDouble() {
  const badge = document.getElementById('powerup-2x-badge');
  if (badge) badge.style.display = 'block';
  Toast.success('✨ 2X POINTS ARMED — make it count!');
}

function _onPowerupSteal(d) {
  _puShiftTimer(-(d.seconds || 5) * 1000);
  const wrap = document.getElementById('timer-wrap');
  if (wrap) { wrap.classList.add('timer-steal-flash'); setTimeout(() => wrap.classList.remove('timer-steal-flash'), 950); }
  Toast.error(`⏳ ${(d.from || 'Opponent')} stole ${d.seconds || 5} seconds from you!`);
  Sound.wrong?.();
}

function _onPowerupUsed(d) {
  if (!d || d.name === State.playerName) return;
  // Opponent/roommate used a power-up — show who and what for stakes.
  Toast.info(`${d.icon || '⚡'} ${(d.name || 'A player')} used ${d.label || 'a power-up'}!`);
}

function _onDuelGameReaction(d) {
  if (!d || d.from === State.playerName) return;
  _floatDuelGameReaction(d.emoji || '👏', false);
}

function _floatDuelGameReaction(emoji, mine) {
  const el = document.createElement('div');
  el.className = 'duel-game-react ' + (mine ? 'mine' : 'theirs');
  el.textContent = emoji;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function _updateDuelBanner(scores) {
  const me  = State.playerName;
  const opp = Object.keys(scores).find(n => n !== me)
           || State.duelOpponent
           || 'OPPONENT';
  const nameA = document.getElementById('tsb-a-name');
  const ptsA  = document.getElementById('tsb-a-pts');
  const nameB = document.getElementById('tsb-b-name');
  const ptsB  = document.getElementById('tsb-b-pts');
  const sideA = document.getElementById('tsb-a');
  if (nameA) nameA.textContent = 'YOU';
  if (nameB) nameB.textContent = opp;
  if (ptsA)  ptsA.textContent  = (scores[me]  || 0).toLocaleString();
  if (ptsB)  ptsB.textContent  = (scores[opp] || 0).toLocaleString();
  if (sideA) sideA.classList.add('my-team');

  // Live score-gap chip: always know if you're ahead, behind, or level.
  const chip = document.getElementById('duel-gap-chip');
  if (chip) {
    const gap = (scores[me] || 0) - (scores[opp] || 0);
    chip.style.display = 'block';
    chip.classList.remove('ahead', 'behind', 'even');
    if (gap > 0)      { chip.classList.add('ahead');  chip.textContent = `▲ AHEAD BY ${gap}`; }
    else if (gap < 0) { chip.classList.add('behind'); chip.textContent = `▼ BEHIND BY ${-gap}`; }
    else              { chip.classList.add('even');   chip.textContent = '⚡ ALL TIED UP'; }
  }
}

function _showLB() {
  const overlay = document.getElementById('lb-overlay');
  if (overlay) { overlay.classList.add('visible'); overlay.setAttribute('aria-hidden','false'); }
}
function _hideLB() {
  const overlay = document.getElementById('lb-overlay');
  if (overlay) { overlay.classList.remove('visible'); overlay.setAttribute('aria-hidden','true'); }
}
function _clearLeaderboardTimers() {
  if (_lbShowTimer) { clearTimeout(_lbShowTimer); _lbShowTimer = null; }
  if (_lbHideTimer) { clearTimeout(_lbHideTimer); _lbHideTimer = null; }
}

/* ── GAME OVER ───────────────────────────────────────────── */

async function _onGameOver(data) {
  _stopTimer();
  _clearLeaderboardTimers();
  _hideLB();
  _hideStreak(true);
  State.scores    = data.final_scores;
  State.playMode  = data.play_mode || State.playMode || 'classic';
  State.resultStats = data;
  State.phase     = 'complete';

  if (typeof Analytics !== 'undefined') {
    const myScore = (data.final_scores && data.final_scores[State.playerName]) || 0;
    Analytics.track('game_completed', {
      play_mode: State.playMode,
      score: myScore,
      total_questions: data.total_questions || State.totalQ,
      is_quick_pick: typeof isQuickPickTopic === 'function' ? isQuickPickTopic(State.topic || '') : null,
    });
  }
  if (data.economy && data.economy[State.playerName]) {
    try {
      await applyUserEconomy(data.economy[State.playerName]);
    } catch (e) {
      console.warn('[Results] Economy sync failed:', e);
    }
  }

  

  // ── Daily streak update — background, never blocks the results screen ──
  if (State.user?.id && typeof lbUpdateDailyStreak === 'function') {
    lbUpdateDailyStreak(State.user.id)
      .then(newStreak => { if (newStreak !== null) State._homeStreak = newStreak; })
      .catch(e => console.warn('[Streak] Update failed silently:', e));
  }
  //Cancel today's reminder since they just played, reschedule for tomorrow
  StreakNotif.cancel();
  StreakNotif.schedule();

  // ─────────────────────────────────────────────────────────
  if (data.team_scores)  State.teamScores  = data.team_scores;
  if (data.team_names)   State.teamNames   = data.team_names;
  if (data.teams)        State.teams       = data.teams;
  goTo('results');
}

/* ── UTILS ───────────────────────────────────────────────── */
function _setPhaseLabel(label) {
  const el = document.getElementById('game-phase-label');
  if (el) el.textContent = label;
}
function _escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── LEAVE MODAL ────────────────────────────────────────── */
function leaveModalOpen() {
  const isSolo = State.playMode === 'solo';
  const isMulti = State.playMode === 'classic' || State.playMode === 'team';
  const isDuel = State.playMode === 'duel';

  const items = [];

  if (isMulti && State.user) {
    items.push('💰 25 coin entry fee (not refunded)');
  }
  if (isDuel) {
    items.push('☠️ You forfeit — opponent wins the pot');
    items.push('🏆 −5 trophies for the loss');
  }
  items.push('📊 All score progress this round');
  if (isSolo) {
    items.push('💰 Coin rewards for this session');
  }
  if (isMulti) {
    items.push('🏆 Your spot in the winner pool');
  }

  const box = document.getElementById('leave-warning-items');
  box.innerHTML = items.map(t => `
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-family:var(--font-body); font-size:14px; font-weight:700;
                   color:rgba(255,100,100,0.9);">${t}</span>
    </div>
  `).join('');

  const modal = document.getElementById('leave-modal');
  modal.style.display = 'flex';
}

function leaveModalClose() {
  document.getElementById('leave-modal').style.display = 'none';
}

function leaveModalConfirm() {
  if (typeof Analytics !== 'undefined') {
    Analytics.track('game_abandoned', { play_mode: State.playMode, question_index: _qIndex });
  }
  leaveModalClose();
  _stopTimer();
  _clearLeaderboardTimers();
  _hideStreak(true);
  WS.off('QUESTION');
  WS.off('ANSWER_REVEAL');
  WS.off('INTERMISSION_LEADERBOARD');
  WS.off('GAME_OVER');
  WS.off('SUDDEN_DEATH');
  WS.off('DUEL_REACTION');
  if (State.ws) { State.ws.close(); State.ws = null; }
  goTo('home');
}
</script>
