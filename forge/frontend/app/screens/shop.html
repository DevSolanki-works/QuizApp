<!--
  SHOP SCREEN — Forge App Track
  Milestone 41 — first pass: generation ticket purchases only.

  For now the only thing sold is generation tickets, priced in coins.
  Price is intentionally temporary (25 coins/ticket) — revisit once Online
  Duel entry fees and a broader economy pass land, per the Decisions Log.

  "Watch an ad for a free ticket" is shown as a disabled preview row so the
  layout doesn't have to be redesigned later — it activates automatically
  once AdMob wiring lands (reuses the already-built /tickets/ad-grant
  endpoint, same as the existing grant_ad_ticket() service function).
-->
<style>
  .shop-wrap {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── TOP BAR ───────────────────────────────────────────── */
  .shop-topbar {
    background: var(--bg-mid);
    border-bottom: 2px solid rgba(0,0,0,0.3);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .shop-back-btn {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.09);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .shop-back-btn:active { background: rgba(255,255,255,0.18); }
  .shop-title {
    font-family: var(--font-pixel); font-size: 10px;
    color: var(--white); letter-spacing: 1px; flex: 1;
  }
  .shop-coin-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,217,61,0.14); border: 1.5px solid rgba(255,217,61,0.3);
    border-radius: 8px; padding: 6px 10px;
  }
  .shop-coin-val { font-family: var(--font-pixel); font-size: 8px; color: var(--yellow); }

  /* ── SCROLLABLE CONTENT ───────────────────────────────────── */
  .shop-scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 18px 16px 40px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .shop-scroll::-webkit-scrollbar { width: 3px; }
  .shop-scroll::-webkit-scrollbar-track { background: transparent; }
  .shop-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .shop-section-label {
    font-family: var(--font-pixel); font-size: 6px;
    color: rgba(255,255,255,0.3); letter-spacing: 1.5px;
  }

  /* ── TICKET PRODUCT CARD ─────────────────────────────────── */
  .shop-ticket-card {
    background: rgba(155,93,229,0.1); border: 1.5px solid rgba(155,93,229,0.3);
    border-radius: var(--radius-lg); padding: 22px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .shop-ticket-icon { font-size: 40px; line-height: 1; }
  .shop-ticket-name { font-family: var(--font-pixel); font-size: 11px; color: #c4a0ff; text-align: center; }
  .shop-ticket-desc {
    font-family: var(--font-body); font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.55); text-align: center; line-height: 1.6;
  }

  /* Quantity stepper */
  .shop-qty-row {
    display: flex; align-items: center; gap: 16px;
  }
  .shop-qty-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.09); border: 1.5px solid rgba(255,255,255,0.18);
    color: var(--white); font-family: var(--font-pixel); font-size: 14px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .shop-qty-btn:active { background: rgba(255,255,255,0.18); }
  .shop-qty-val {
    font-family: var(--font-pixel); font-size: 20px; color: var(--white);
    min-width: 40px; text-align: center;
  }

  .shop-quick-qty-row { display: flex; gap: 8px; }
  .shop-quick-qty-btn {
    flex: 1; height: 34px; border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.6); font-family: var(--font-pixel); font-size: 7px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .shop-quick-qty-btn.selected {
    background: rgba(155,93,229,0.2); border-color: rgba(155,93,229,0.55); color: #c4a0ff;
  }

  .shop-buy-btn {
    width: 100%; height: 54px; border-radius: var(--radius-pill);
    background: var(--yellow); color: var(--text-dark); border: none;
    font-family: var(--font-pixel); font-size: 9px; letter-spacing: 0.5px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    box-shadow: 0 5px 0 var(--yellow-dark);
    transition: transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .shop-buy-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--yellow-dark); }
  .shop-buy-btn:disabled { opacity: 0.4; pointer-events: none; }

  /* ── AD ROW (disabled preview) ───────────────────────────── */
  .shop-ad-row {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; border-radius: var(--radius-md);
    background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
    opacity: 0.55;
  }
  .shop-ad-icon { font-size: 24px; flex-shrink: 0; }
  .shop-ad-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .shop-ad-name { font-family: var(--font-pixel); font-size: 8px; color: var(--white); }
  .shop-ad-desc { font-family: var(--font-pixel); font-size: 5.5px; color: rgba(255,255,255,0.35); line-height: 1.7; }
  .shop-ad-badge {
    font-family: var(--font-pixel); font-size: 5px; padding: 4px 8px;
    border-radius: var(--radius-pill); background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4);
    flex-shrink: 0; white-space: nowrap;
  }

  /* ── INSUFFICIENT COINS NOTE ──────────────────────────────── */
  .shop-insufficient-note {
    font-family: var(--font-pixel); font-size: 6px; color: var(--red);
    text-align: center; line-height: 1.8;
  }

  /* ── GUEST GATE ───────────────────────────────────────────── */
  .shop-guest-gate {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 40px 20px; text-align: center;
  }
  .shop-guest-icon { font-size: 44px; }
  .shop-guest-text {
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.6); line-height: 1.7;
  }
</style>

<div class="shop-wrap">

  <!-- TOP BAR -->
  <div class="shop-topbar z1">
    <button class="shop-back-btn" onclick="shopGoBack()" aria-label="Back">←</button>
    <span class="shop-title">🛒 SHOP</span>
    <div class="shop-coin-pill" id="shop-coin-pill" style="display:none;">
      <span style="font-size:14px;">🪙</span>
      <span class="shop-coin-val" id="shop-coins">—</span>
    </div>
  </div>

  <!-- SCROLLABLE CONTENT -->
  <div class="shop-scroll z1" id="shop-scroll">
    <!-- Populated by onShopShow() — either the ticket shop or a sign-in gate -->
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════════
   SHOP SCREEN — Forge App Track
   ══════════════════════════════════════════════════════════ */

let _shopQty = 1;
const SHOP_QUICK_QTYS = [1, 3, 5];

function onShopShow() {
  _shopQty = 1;
  _shopRender();
}

function _shopRender() {
  const scroll   = document.getElementById('shop-scroll');
  const coinPill = document.getElementById('shop-coin-pill');
  if (!scroll) return;

  if (!State.user) {
    if (coinPill) coinPill.style.display = 'none';
    scroll.innerHTML = `
      <div class="shop-guest-gate">
        <span class="shop-guest-icon">🔒</span>
        <p class="shop-guest-text">Sign in with Google to buy generation tickets with your coins.</p>
        <button class="btn btn-primary" style="width:auto;padding:0 24px;" onclick="shopGoBack(); hOpenSigninModal();">
          SIGN IN
        </button>
      </div>`;
    return;
  }

  if (coinPill) coinPill.style.display = 'flex';
  const coinsEl = document.getElementById('shop-coins');
  if (coinsEl) coinsEl.textContent = Number(State.user.coins || 0).toLocaleString();

  const costPerTicket = Number(State.user.coins_per_ticket || 25);
  const totalCost     = costPerTicket * _shopQty;
  const canAfford     = Number(State.user.coins || 0) >= totalCost;

  scroll.innerHTML = `
    <p class="shop-section-label">GENERATION TICKETS</p>

    <div class="shop-ticket-card">
      <span class="shop-ticket-icon">🎟️</span>
      <span class="shop-ticket-name">GENERATION TICKET</span>
      <p class="shop-ticket-desc">
        Spend 1 ticket to play a custom AI-generated topic in any mode.
        Quick Pick topics never need a ticket.
      </p>

      <div class="shop-quick-qty-row">
        ${SHOP_QUICK_QTYS.map(q => `
          <button class="shop-quick-qty-btn ${_shopQty === q ? 'selected' : ''}" onclick="shopSetQty(${q})">${q}×</button>
        `).join('')}
      </div>

      <div class="shop-qty-row">
        <button class="shop-qty-btn" onclick="shopStepQty(-1)">−</button>
        <span class="shop-qty-val" id="shop-qty-val">${_shopQty}</span>
        <button class="shop-qty-btn" onclick="shopStepQty(1)">+</button>
      </div>

      <button class="shop-buy-btn" id="shop-buy-btn" ${canAfford ? '' : 'disabled'} onclick="shopBuyTickets()">
        BUY FOR ${totalCost} 🪙
      </button>
      ${canAfford ? '' : `<p class="shop-insufficient-note">Not enough coins — you need ${totalCost - Number(State.user.coins || 0)} more.</p>`}
    </div>

    <p class="shop-section-label" style="margin-top:6px;">MORE WAYS TO EARN TICKETS</p>

    <div class="shop-ad-row">
      <span class="shop-ad-icon">🎥</span>
      <div class="shop-ad-info">
        <span class="shop-ad-name">WATCH AN AD FOR 1 TICKET</span>
        <span class="shop-ad-desc">Up to 5 per day, no coins needed</span>
      </div>
      <span class="shop-ad-badge">COMING SOON</span>
    </div>
  `;
}

function shopSetQty(q) {
  Sound.click();
  _shopQty = q;
  _shopRender();
}

function shopStepQty(delta) {
  Sound.click();
  _shopQty = Math.max(1, Math.min(99, _shopQty + delta));
  _shopRender();
}

async function shopBuyTickets() {
  if (!State.user?.id) return;
  const btn = document.getElementById('shop-buy-btn');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }

  try {
    const data = await API.buyTickets(State.user.id, _shopQty);

    State.user.coins         = data.coins;
    State.user.tickets_today = data.tickets_today;
    Session.save();

    Toast.success(`+${_shopQty} generation ticket${_shopQty > 1 ? 's' : ''}!`);
    Sound.correct();

    if (typeof lbUpsertPlayer === 'function') {
      lbUpsertPlayer(State.user.id, State.user.name, State.user.coins, State.user.trophies, data)
        .catch(() => {});
    }

    _shopQty = 1;
    _shopRender();
  } catch (e) {
    console.error('[Shop] Buy failed:', e);
    Toast.error('Purchase failed. Try again.');
    _shopRender();
  }
}

function shopGoBack() {
  Sound.click();
  goTo('home');
}
</script>
