<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1B2EAD" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>FORGE — AI Trivia Showdown</title>

  <!-- Press Start 2P = pixel font for UI chrome / titles / labels -->
  <!-- Nunito = clean readable font for questions & body copy -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════════════════
       CSS VARIABLES — FORGE QUIZ THEME
       ══════════════════════════════════════════════════════ */
    :root {
      --bg:           #0D1B8E;
      --bg-mid:       #1B2EAD;
      --bg-light:     #2540CC;
      --white:        #FFFFFF;
      --off-white:    #EEF2FF;
      --text-dark:    #1A1A2E;

      --yellow:       #FFD93D;
      --yellow-dark:  #E6B800;
      --green:        #06D6A0;
      --red:          #EF233C;
      --purple:       #9B5DE5;

      --opt-a:        #E63946;
      --opt-b:        #2196F3;
      --opt-c:        #06D6A0;
      --opt-d:        #9B5DE5;

      --font-pixel:   'Press Start 2P', monospace;
      --font-body:    'Nunito', sans-serif;

      --max-w:        430px;
      --radius-sm:    8px;
      --radius-md:    14px;
      --radius-lg:    20px;
      --radius-pill:  999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ──────────────────────────────────────── */
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background-image: radial-gradient(ellipse at 50% 0%, #2540CC 0%, #0D1B8E 65%);
    }

    .screen {
      width: 100%;
      max-width: var(--max-w);
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    .screen.active { display: flex; }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-pixel);
      font-size: 10px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--yellow);
      color: var(--text-dark);
      box-shadow: 0 6px 0 var(--yellow-dark), 0 8px 20px rgba(255,217,61,0.35);
    }
    .btn-primary:active {
      box-shadow: 0 2px 0 var(--yellow-dark);
      transform: translateY(4px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .btn-secondary:active {
      box-shadow: none;
      transform: translateY(4px);
    }

    .btn-danger {
      background: var(--red);
      color: var(--white);
      box-shadow: 0 6px 0 #9B0019;
    }
    .btn-danger:active {
      box-shadow: 0 2px 0 #9B0019;
      transform: translateY(4px);
    }

    /* ── INPUTS ──────────────────────────────────────────── */
    .input-label {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--yellow);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: block;
    }
    .input-field {
      width: 100%;
      height: 56px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-md);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 700;
      padding: 0 18px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }
    .input-field:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255,217,61,0.18);
    }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: var(--radius-lg);
    }

    /* ── BADGE ───────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: var(--radius-pill);
      font-family: var(--font-pixel);
      font-size: 8px;
    }
    .badge-yellow {
      background: rgba(255,217,61,0.18);
      color: var(--yellow);
      border: 1px solid rgba(255,217,61,0.4);
    }
    .badge-green {
      background: rgba(6,214,160,0.18);
      color: var(--green);
      border: 1px solid rgba(6,214,160,0.4);
    }
    .badge-white {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* ── DIVIDER ─────────────────────────────────────────── */
    .divider-text {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-family: var(--font-pixel);
      font-size: 8px;
      width: 100%;
    }
    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* ── TOAST ───────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      width: calc(min(var(--max-w), 100vw) - 32px);
    }
    .toast {
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-family: var(--font-pixel);
      font-size: 8px;
      line-height: 1.8;
      animation: toast-in 0.25s ease forwards;
      pointer-events: all;
    }
    .toast-error   { background: var(--red);    color: #fff; }
    .toast-success { background: var(--green);  color: #003; }
    .toast-info    { background: var(--yellow); color: #1A1A2E; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── DOT LOADER ──────────────────────────────────────── */
    .dot-loader { display: flex; gap: 6px; align-items: center; }
    .dot-loader span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      animation: dot-bounce 1.2s infinite ease-in-out;
    }
    .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1;   }
    }

    /* ── DECORATIVE BG ELEMENTS ──────────────────────────── */
    .confetti-bg, .stars-bg {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 0;
    }
    .confetti-piece {
      position: absolute; border-radius: 3px;
      animation: confetti-fall var(--dur,8s) linear var(--delay,0s) infinite;
      opacity: 0.15;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 0;    }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0;    }
    }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: twinkle var(--dur,3s) infinite ease-in-out var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(1);   }
      50%      { opacity: 0.9; transform: scale(1.4); }
    }

    /* ── UTILS ───────────────────────────────────────────── */
    .z1 { position: relative; z-index: 1; }
    .pixel { font-family: var(--font-pixel) !important; }
    .text-center { text-align: center; }
    .fade-up { animation: fade-up 0.35s ease forwards; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4922314688440658" crossorigin="anonymous"></script>
</head>
<body>
<div id="app">
  <div id="toast-container"></div>

  <section id="screen-home"    class="screen active"></section>
  <section id="screen-solo"    class="screen"></section>
  <section id="screen-lobby"   class="screen"></section>
  <section id="screen-game"    class="screen"></section>
  <section id="screen-results" class="screen"></section>
</div>

<script>
/* ── CONFIG ─────────────────────────────────────────────── */
const API_BASE = 'https://forge-backend-878124462453.us-central1.run.app';
const WS_BASE  = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');

/* ── GLOBAL STATE ────────────────────────────────────────── */
const State = {
  playerName : '',
  roomCode   : '',
  isHost     : false,
  isSolo     : false,
  topic      : '',
  ws         : null,
  players    : [],
  currentQ   : null,
  scores     : {},
  totalQ     : 10,
};

/* ── ROUTER ─────────────────────────────────────────────── */
const Screens = {
  home    : { id: 'screen-home',    file: 'screens/home.html'    },
  solo    : { id: 'screen-solo',    file: 'screens/solo.html'    },
  lobby   : { id: 'screen-lobby',   file: 'screens/lobby.html'   },
  game    : { id: 'screen-game',    file: 'screens/game.html'    },
  results : { id: 'screen-results', file: 'screens/results.html' },
};

async function goTo(name) {
  const cfg = Screens[name];
  if (!cfg) return;
  const el = document.getElementById(cfg.id);

  if (!el.dataset.loaded) {
    try {
      const html = await (await fetch(cfg.file)).text();
      el.innerHTML = html;
      el.dataset.loaded = 'true';
      el.querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        document.body.appendChild(s);
      });
    } catch (e) {
      Toast.error('Failed to load screen.');
      return;
    }
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  el.classList.add('active');

  const hook = `on${name.charAt(0).toUpperCase() + name.slice(1)}Show`;
  if (typeof window[hook] === 'function') window[hook]();
}

/* ── TOAST ──────────────────────────────────────────────── */
const Toast = {
  _show(msg, cls, dur = 3000) {
    const c = document.getElementById('toast-container');
    const d = document.createElement('div');
    d.className = `toast ${cls}`;
    d.textContent = msg;
    c.appendChild(d);
    setTimeout(() => d.remove(), dur);
  },
  error  (m) { this._show(m, 'toast-error');   },
  success(m) { this._show(m, 'toast-success'); },
  info   (m) { this._show(m, 'toast-info');    },
};

/* ── API ────────────────────────────────────────────────── */
const API = {
  async createRoom(hostName) {
    const r = await fetch(`${API_BASE}/rooms/create`, {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify({ host_name: hostName }),
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async getRoom(code) {
    const r = await fetch(`${API_BASE}/rooms/${code}`);
    if (!r.ok) throw new Error('Room not found');
    return r.json();
  },
  async health() {
    return (await fetch(`${API_BASE}/health`)).json();
  },
};

/* ── WEBSOCKET ──────────────────────────────────────────── */
const WS = {
  connect(roomCode, playerName) {
    if (State.ws) { State.ws.close(); State.ws = null; }
    const url = `${WS_BASE}/ws/${roomCode}/${encodeURIComponent(playerName)}`;
    State.ws = new WebSocket(url);
    State.ws.onopen    = () => console.log('[WS] Connected');
    State.ws.onmessage = (e) => {
      let msg; try { msg = JSON.parse(e.data); } catch { return; }
      console.log('[WS] ←', msg.type, msg.data);
      this._dispatch(msg);
    };
    State.ws.onerror = () => Toast.error('Connection error.');
    State.ws.onclose = () => console.log('[WS] Closed');
  },
  send(payload) {
    if (State.ws?.readyState === WebSocket.OPEN)
      State.ws.send(JSON.stringify(payload));
  },
  _handlers: {},
  on(type, fn)  { this._handlers[type] = fn; },
  off(type)     { delete this._handlers[type]; },
  _dispatch(msg){ const h = this._handlers[msg.type]; if (h) h(msg.data); },
};

/* ── DECORATION HELPERS ─────────────────────────────────── */
function spawnConfetti(container) {
  const cols = ['#FFD93D','#06D6A0','#4FC3F7','#EF233C','#9B5DE5','#FF9F1C'];
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size  = 6 + Math.random() * 10;
    const col   = cols[Math.floor(Math.random() * cols.length)];
    const dur   = 7 + Math.random() * 8;
    const delay = Math.random() * -12;
    el.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${col};
      border-radius:${[2,4,6][Math.floor(Math.random()*3)]}px;
      --dur:${dur}s;--delay:${delay}s;
    `;
    container.appendChild(el);
  }
}

function spawnStars(container) {
  for (let i = 0; i < 35; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    const size  = 1.5 + Math.random() * 2.5;
    const dur   = 2 + Math.random() * 4;
    const delay = Math.random() * -5;
    el.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --dur:${dur}s;--delay:${delay}s;
    `;
    container.appendChild(el);
  }
}

/* ── BOOT ───────────────────────────────────────────────── */
(async () => {
  API.health().catch(() => {});  // warm up Cloud Run silently
  await goTo('home');
})();
</script>
</body>
</html>
